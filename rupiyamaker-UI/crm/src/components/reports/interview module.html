            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Settings
          </button>
        </div>
      </div>
    </div>
  );
}

function RescheduleModal({ candidate, onClose, onSubmit }) {
  const [customDate, setCustomDate] = useState(''); const [reason, setReason] = useState('');
  if (!candidate) return null;
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
      <div className="bg-white border border-slate-200 rounded-xl w-full max-w-sm p-6 shadow-2xl">
        <h2 className="text-lg font-bold text-slate-900 mb-1">Reschedule Date</h2>
        <p className="text-xs text-slate-600 mb-5">For {candidate.name}</p>
        <label className="block text-sm text-slate-700 mb-1">New Date</label>
        <input type="date" value={customDate} onChange={(e) => setCustomDate(e.target.value)} className="w-full bg-white border border-slate-300 rounded-md px-4 py-2 text-slate-900 mb-4 outline-none focus:border-blue-500" />
        <label className="block text-sm text-slate-700 mb-1">Reason <span className="text-red-600">*</span></label>
        <input type="text" placeholder="Mandatory reschedule reason" value={reason} onChange={(e) => setReason(e.target.value)} className="w-full bg-white border border-slate-300 rounded-md px-4 py-2 text-slate-900 mb-6 text-sm outline-none focus:border-blue-500" />
        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 bg-slate-100 border border-slate-300 text-slate-700 rounded-md text-sm">Cancel</button>
          <button disabled={!customDate || !reason.trim()} onClick={() => onSubmit(candidate.id, new Date(customDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }), reason.trim())} className={`flex-1 py-2 rounded-md text-sm font-bold ${customDate && reason.trim() ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-500'}`}>Confirm</button>
        </div>
      </div>
    </div>
  );
}

function DeclineModal({ candidate, options, onClose, onSubmit }) {
  const [reason, setReason] = useState(''); const [remarks, setRemarks] = useState('');
  if (!candidate) return null;
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
      <div className="bg-white border border-slate-200 rounded-xl w-full max-w-md p-6 shadow-2xl">
        <h2 className="text-lg font-bold text-red-600 mb-5">Decline Candidate</h2>
        <select value={reason} onChange={(e) => setReason(e.target.value)} className="w-full bg-white border border-slate-300 rounded-md px-4 py-3 text-slate-900 mb-4 outline-none focus:border-red-500">
          <option value="" disabled>Select Reason...</option>
          {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
        </select>
        <textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} placeholder="Mandatory Remarks..." className="w-full h-24 bg-white border border-slate-300 rounded-md p-3 text-slate-900 mb-6 outline-none focus:border-red-500 resize-none" />
        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 bg-slate-100 border border-slate-300 text-slate-700 rounded-md text-sm">Cancel</button>
          <button disabled={!reason || !remarks} onClick={() => onSubmit(candidate.id, reason, remarks)} className={`flex-1 py-2.5 rounded-md text-sm font-bold ${reason && remarks ? 'bg-red-600 text-white' : 'bg-slate-200 text-slate-500'}`}>Confirm Reject</button>
        </div>
      </div>
    </div>
  );
}

// --- FULL CREATE FORM ---
function CreateInterviewDrawer({ isOpen, onClose, onSave, onReassign, allCandidates, cooldownDays, companySettings, onOpenShareForm }) {
  const emptyForm = {
    name: '', phone: '', altPhone: '', interviewDate: '', gender: 'Male',
    highestQualification: '', qualificationLevel: '', role: 'Sales Executive',
    maritalStatus: 'Single', age: '', city: '', source: 'Naukri.com',
    expType: 'Fresher', yearsExpNum: 0, monthsExpNum: 0, numCompanies: '',
    livingArrangement: 'With Family', bankingExp: 'No',
    lastSalary: '', salaryExpectation: '', finalOfferedSalary: '',
    documents: { salarySlip: false, bankStatement: false, expLetter: false },
    companies: []
  };
  const [formData, setFormData] = useState(emptyForm);
  const [duplicateMatch, setDuplicateMatch] = useState(null);
  const [canReassign, setCanReassign] = useState(false);
  const [reassignReason, setReassignReason] = useState('');
  const [showDuplicateDetails, setShowDuplicateDetails] = useState(false);
  const [qualSearch, setQualSearch] = useState('');
  const [qualOpen, setQualOpen] = useState(false);
  const qualRef = useRef(null);

  useEffect(() => {
    if (isOpen) { setFormData(emptyForm); setDuplicateMatch(null); setReassignReason(''); setShowDuplicateDetails(false); setQualSearch(''); setQualOpen(false); }
  }, [isOpen]);

  useEffect(() => {
    function clickOutside(e) { if (qualRef.current && !qualRef.current.contains(e.target)) setQualOpen(false); }
    document.addEventListener('mousedown', clickOutside);
    return () => document.removeEventListener('mousedown', clickOutside);
  }, []);

  const handlePhoneCheck = (e) => {
    const value = e.target.value.replace(/\D/g, '').slice(0, 10);
    setFormData(prev => ({ ...prev, phone: value }));
    if (value.length >= 10) {
      const match = allCandidates.find(c => c.phone === value);
      if (match) { setDuplicateMatch(match); const d = (new Date() - new Date(match.lastUpdated)) / (1000*60*60*24); setCanReassign(!(match.stage==='Interview' && d < cooldownDays)); }
      else setDuplicateMatch(null);
    } else setDuplicateMatch(null);
  };

  const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
  const handleCompanyChange = (i, f, v) => {
    const nc = [...formData.companies];
    if (!nc[i]) nc[i] = { name: '', duration: '', salary: '' };
    nc[i][f] = v;
    setFormData(prev => ({ ...prev, companies: nc }));
  };
  const handleNumCompaniesChange = (e) => {
    const count = parseInt(e.target.value, 10) || 0;
    setFormData(prev => ({ ...prev, numCompanies: e.target.value, companies: Array.from({ length: count }, () => ({ name: '', duration: '', salary: '' })) }));
  };
  const handleDocChange = (doc) => setFormData(prev => ({ ...prev, documents: { ...prev.documents, [doc]: !prev.documents[doc] } }));

  const selectQualification = (entry, level) => {
    setFormData(prev => ({ ...prev, highestQualification: entry, qualificationLevel: level }));
    setQualSearch(entry);
    setQualOpen(false);
  };

  const filteredQualGroups = qualificationCatalog.map(group => ({
    ...group,
    entries: group.entries.filter(e => e.toLowerCase().includes(qualSearch.toLowerCase()))
  })).filter(g => g.entries.length > 0);

  const expLabel = formData.expType === 'Experienced' 
    ? `${formData.yearsExpNum} yr${formData.yearsExpNum !== 1 ? 's' : ''} ${formData.monthsExpNum} mo`
    : 'Fresher';

  const submitForm = (e) => {
    e.preventDefault();
    const selectedDate = formData.interviewDate ? formatDate(new Date(`${formData.interviewDate}T00:00:00`)) : formatDate(new Date());
    onSave({
      name: formData.name || 'New Candidate',
      phone: formData.phone,
      role: formData.role,
      source: formData.source,
      gender: formData.gender,
      exp: formData.expType === 'Fresher' ? 'Fresher' : `${formData.yearsExpNum}y ${formData.monthsExpNum}m`,
      date: selectedDate,
      remarks: 'Newly added',
      profile: { ...formData, qualification: formData.highestQualification }
    });
  };

  if (!isOpen) return null;

  const InputField = ({ label, required: req, children }) => (
    <div>
      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">{label}{req && <span className="text-red-400 ml-0.5">*</span>}</label>
      {children}
    </div>
  );
  const inputCls = "w-full bg-slate-50 border border-slate-200 focus:bg-white focus:border-indigo-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none transition-all";
  const SectionCard = ({ title, icon, color = 'indigo', children }) => (
    <div className={`bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm`}>
      <div className={`px-4 py-3 border-b border-slate-100 bg-gradient-to-r from-${color}-50 to-slate-50 flex items-center gap-2`}>
        <span className="text-base">{icon}</span>
        <span className={`text-xs font-black text-${color}-700 uppercase tracking-wider`}>{title}</span>
      </div>
      <div className="p-4 space-y-4">{children}</div>
    </div>
  );

  return (
    <div className="fixed inset-0 z-50 flex justify-end">
      <div className="absolute inset-0 bg-black/30 backdrop-blur-sm" onClick={onClose}></div>
      <div className="relative w-full max-w-2xl bg-white h-full border-l border-slate-200 flex flex-col shadow-2xl" style={{animation:'slideInRight 0.25s ease-out'}}>
        
        {/* Header */}
        <div className="px-6 py-4 border-b border-slate-200 bg-gradient-to-r from-slate-900 to-indigo-900 flex justify-between items-center">
          <div>
            <h2 className="font-black text-white text-lg flex items-center gap-2">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.9"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
              Add Candidate
            </h2>
            <p className="text-slate-400 text-xs mt-0.5">Full interview registration form</p>
          </div>
          <div className="flex items-center gap-2">
            {onOpenShareForm && (
              <button onClick={onOpenShareForm} title="Share Form Link" className="p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white/80 border border-white/10 transition-all">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              </button>
            )}
            <button onClick={onClose} className="p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition-colors">
              <X size={18} />
            </button>
          </div>
        </div>

        <div className="p-5 overflow-y-auto custom-scrollbar flex-1 bg-slate-50 space-y-4">

          {/* Phone Check */}
          <div className="bg-white border-2 border-indigo-200 rounded-2xl p-4">
            <label className="block text-xs font-black text-indigo-600 uppercase tracking-wider mb-2">📱 Phone Number <span className="text-red-400">*</span></label>
            <input required name="phone" value={formData.phone} onChange={handlePhoneCheck}
              className="w-full bg-indigo-50 border border-indigo-200 focus:bg-white focus:border-indigo-500 rounded-xl px-4 py-3 text-slate-900 text-base font-bold outline-none transition-all tracking-widest"
              placeholder="Enter 10-digit mobile" maxLength="10" />
            {formData.phone.length > 0 && formData.phone.length < 10 && (
              <p className="text-xs text-amber-600 mt-1 font-medium">Enter full 10-digit number</p>
            )}
          </div>

          {/* Duplicate Match Card */}
          {duplicateMatch && (() => {
            const stageMeta = { Interview:{bg:'bg-blue-600',light:'bg-blue-50 border-blue-200',text:'text-blue-700'}, 'Round 2':{bg:'bg-indigo-600',light:'bg-indigo-50',text:'text-indigo-700'}, 'Job Offered':{bg:'bg-orange-500',light:'bg-orange-50',text:'text-orange-700'}, Training:{bg:'bg-yellow-500',light:'bg-yellow-50',text:'text-yellow-700'}, Hired:{bg:'bg-emerald-600',light:'bg-emerald-50',text:'text-emerald-700'}, Rejected:{bg:'bg-red-600',light:'bg-red-50',text:'text-red-700'} };
            const sm = stageMeta[duplicateMatch.stage] || {bg:'bg-slate-600',light:'bg-slate-50',text:'text-slate-700'};
            const activities = duplicateMatch.activityHistory || [];
            return (
              <div className="rounded-2xl overflow-hidden border border-slate-200 shadow-lg">
                <div className="bg-gradient-to-r from-slate-800 to-slate-900 px-5 py-4">
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 rounded-xl bg-white/10 border border-white/20 flex items-center justify-center text-white text-xl font-black">{duplicateMatch.name.charAt(0)}</div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-3 flex-wrap">
                        <h3 className="text-lg font-black text-white">{duplicateMatch.name}</h3>
                        <span className={`text-[11px] font-black text-white px-2.5 py-1 rounded-full ${sm.bg}`}>{duplicateMatch.stage}{duplicateMatch.subStage ? ` · ${duplicateMatch.subStage}` : ''}</span>
                      </div>
                      <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                        <span className="text-xs text-slate-400">📱 {duplicateMatch.phone}</span>
                        <span className="text-slate-600">•</span>
                        <span className="text-xs text-slate-400">{duplicateMatch.role}</span>
                        <span className="text-slate-600">•</span>
                        <span className="text-xs text-slate-400">{duplicateMatch.exp}</span>
                      </div>
                    </div>
                  </div>
                </div>
                <div className="bg-slate-800/90 px-5 py-3 grid grid-cols-3 gap-4 text-xs">
                  <div><div className="text-slate-500 uppercase text-[10px] font-bold mb-0.5">Owner</div><div className="text-white font-bold">{duplicateMatch.hr}</div><div className="text-slate-400">{duplicateMatch.hrAddress||'Desk N/A'}</div></div>
                  <div><div className="text-slate-500 uppercase text-[10px] font-bold mb-0.5">Created</div><div className="text-white font-medium">{duplicateMatch.createdDate||'N/A'}</div></div>
                  <div><div className="text-slate-500 uppercase text-[10px] font-bold mb-0.5">Last Updated</div><div className="text-white font-medium">{formatDate(new Date(duplicateMatch.lastUpdated))}</div></div>
                </div>
                {duplicateMatch.stage==='Rejected'&&duplicateMatch.subStage&&(<div className="bg-red-50 border-b border-red-200 px-5 py-3 flex items-center gap-3"><XCircle size={16} className="text-red-500 shrink-0"/><div><div className="text-[10px] font-black text-red-600 uppercase tracking-wider">Rejection Reason</div><div className="text-sm font-semibold text-red-800">{duplicateMatch.subStage}</div>{duplicateMatch.remarks&&<div className="text-xs text-red-600 mt-0.5 italic">"{duplicateMatch.remarks}"</div>}</div></div>)}
                <div className="bg-white border-b border-slate-200 px-5 py-3 flex gap-4">
                  <div className="flex items-center gap-1.5 text-xs font-semibold text-orange-600"><RefreshCw size={12}/> {duplicateMatch.reassignCount||0} Reassign{(duplicateMatch.reassignCount||0)!==1?'s':''}</div>
                  <div className="flex items-center gap-1.5 text-xs font-semibold text-indigo-600"><Calendar size={12}/> {duplicateMatch.rescheduleCount||0} Reschedule{(duplicateMatch.rescheduleCount||0)!==1?'s':''}</div>
                  <div className="flex items-center gap-1.5 text-xs font-semibold text-blue-600"><History size={12}/> {activities.length} Activity</div>
                </div>
                <div className="bg-white px-5 py-4">
                  <div className="flex items-center justify-between mb-3">
                    <div className="text-[11px] font-black text-slate-600 uppercase tracking-wider">Activity History</div>
                    {activities.length>3&&<button onClick={()=>setShowDuplicateDetails(!showDuplicateDetails)} className="text-[11px] text-blue-600 hover:text-blue-800 font-semibold flex items-center gap-1">{showDuplicateDetails?<><ChevronDown size={12}/> Less</>:<><ChevronRight size={12}/> +{activities.length-3} more</>}</button>}
                  </div>
                  {activities.length===0&&<div className="text-xs text-slate-400 italic py-2">No activity logged.</div>}
                  <div className="space-y-2">{(showDuplicateDetails?activities:activities.slice(-3)).map((log,i)=>(
                    <div key={i} className="flex items-start gap-3 text-xs">
                      <div className="w-1.5 h-1.5 rounded-full bg-blue-500 mt-1.5 shrink-0"></div>
                      <div className="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
                        <div className="flex items-center justify-between gap-2"><span className="font-bold text-slate-700">{log.action}</span><span className="text-slate-400 text-[10px] shrink-0">{log.date}</span></div>
                        <div className="text-slate-500 mt-0.5">{log.details}</div>
                      </div>
                    </div>
                  ))}</div>
                </div>
                <div className="px-5 py-5 bg-slate-50 border-t border-slate-200">
                  {canReassign?(
                    <div>
                      <div className="text-xs font-black text-slate-700 uppercase tracking-wider mb-2">Re-assign to Me <span className="text-red-500">*</span></div>
                      <textarea value={reassignReason} onChange={e=>setReassignReason(e.target.value)} placeholder="Enter mandatory audit reason..." className="w-full h-20 bg-white border border-slate-300 rounded-xl p-3 text-sm text-slate-900 outline-none mb-3 focus:border-blue-500 resize-none"/>
                      <button disabled={!reassignReason.trim()} onClick={()=>onReassign(duplicateMatch.id,reassignReason.trim(),duplicateMatch)} className={`w-full py-3 rounded-xl font-black text-sm transition-all ${reassignReason.trim()?'bg-orange-600 hover:bg-orange-500 text-white shadow-lg shadow-orange-600/20':'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>Transfer Lead to Me</button>
                    </div>
                  ):(
                    <div className="rounded-xl border border-red-200 bg-red-50 p-4 flex items-start gap-4">
                      <Lock size={22} className="text-red-500 mt-0.5 shrink-0"/>
                      <div><div className="text-sm font-black text-red-700">Lead is Locked</div><div className="text-xs text-red-600/80 mt-1 leading-relaxed"><b>{duplicateMatch.hr}</b> recently updated this lead. {cooldownDays}-day cooldown active.</div></div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Main Form */}
          {!duplicateMatch && formData.phone.length >= 10 && (
            <form id="create" onSubmit={submitForm} className="space-y-4">

              {/* Basic Info */}
              <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                <div className="px-4 py-3 border-b border-slate-100 bg-gradient-to-r from-indigo-50 to-slate-50 flex items-center gap-2">
                  <span className="text-base">👤</span>
                  <span className="text-xs font-black text-indigo-700 uppercase tracking-wider">Basic Info</span>
                </div>
                <div className="p-4">
                  <div className="grid grid-cols-2 gap-3">
                    <InputField label="Candidate Name" required>
                      <input required name="name" value={formData.name} onChange={handleChange} className={inputCls} placeholder="Full name" />
                    </InputField>
                    <InputField label="Interview Date" required>
                      <input required type="date" name="interviewDate" value={formData.interviewDate} onChange={handleChange} className={inputCls} />
                    </InputField>
                    <InputField label="Alt. Phone">
                      <input name="altPhone" value={formData.altPhone} onChange={handleChange} className={inputCls} placeholder="Optional" />
                    </InputField>
                    <InputField label="Source">
                      <select name="source" value={formData.source} onChange={handleChange} className={inputCls}>
                        <option>Naukri.com</option><option>LinkedIn</option><option>Walk-In</option><option>Indeed</option><option>Referral</option><option>IVR</option>
                      </select>
                    </InputField>
                    <InputField label="Age">
                      <input type="number" name="age" value={formData.age} onChange={handleChange} className={inputCls} placeholder="e.g. 24" />
                    </InputField>
                    <InputField label="City">
                      <input name="city" value={formData.city} onChange={handleChange} className={inputCls} placeholder="Current city" />
                    </InputField>
                    <div className="col-span-2">
                      <InputField label="Gender">
                        <div className="flex gap-2">
                          {['Male', 'Female'].map(g => (
                            <label key={g} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border-2 cursor-pointer transition-all font-bold text-sm ${formData.gender===g?'bg-indigo-600 border-indigo-600 text-white':'bg-white border-slate-200 text-slate-500 hover:border-indigo-300'}`}>
                              <input type="radio" name="gender" value={g} checked={formData.gender===g} onChange={handleChange} className="hidden" />
                              {g === 'Male' ? '👨' : '👩'} {g}
                            </label>
                          ))}
                        </div>
                      </InputField>
                    </div>
                  </div>
                </div>
              </div>

              {/* Background */}
              <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                <div className="px-4 py-3 border-b border-slate-100 bg-gradient-to-r from-purple-50 to-slate-50 flex items-center gap-2">
                  <span className="text-base">🎓</span>
                  <span className="text-xs font-black text-purple-700 uppercase tracking-wider">Education & Background</span>
                </div>
                <div className="p-4">
                  <div className="grid grid-cols-2 gap-3">
                    <InputField label="Marital Status">
                      <select name="maritalStatus" value={formData.maritalStatus} onChange={handleChange} className={inputCls}>
                        <option>Single</option><option>Married</option>
                      </select>
                    </InputField>
                    <InputField label="Living Arrangement">
                      <select name="livingArrangement" value={formData.livingArrangement} onChange={handleChange} className={inputCls}>
                        <option>With Family</option><option>Independent</option>
                      </select>
                    </InputField>
                    <div className="col-span-2">
                      <InputField label="Highest Qualification">
                        <div className="relative" ref={qualRef}>
                          <input
                            value={qualSearch}
                            onChange={e => { setQualSearch(e.target.value); setQualOpen(true); }}
                            onFocus={() => setQualOpen(true)}
                            placeholder="Type to search e.g. MBA, BA, ITI..."
                            className={inputCls}
                          />
                          {formData.qualificationLevel && (
                            <div className="absolute right-3 top-1/2 -translate-y-1/2 bg-indigo-100 text-indigo-700 text-[10px] font-black px-2 py-0.5 rounded-full">{formData.qualificationLevel}</div>
                          )}
                          {qualOpen && filteredQualGroups.length > 0 && (
                            <div className="absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl z-30 max-h-56 overflow-y-auto custom-scrollbar">
                              {filteredQualGroups.map(group => (
                                <div key={group.level}>
                                  <div className="px-3 py-1.5 text-[10px] font-black text-slate-400 uppercase tracking-wider bg-slate-50 border-b border-slate-100 sticky top-0">{group.level}</div>
                                  {group.entries.map(entry => (
                                    <button type="button" key={entry} onClick={() => selectQualification(entry, group.level)}
                                      className="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
                                      {entry}
                                    </button>
                                  ))}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </InputField>
                    </div>
                    <div className="col-span-2">
                      <InputField label="Banking Experience?">
                        <div className="flex gap-2">
                          {['Yes', 'No'].map(opt => (
                            <label key={opt} className={`flex-1 flex items-center justify-center py-2.5 rounded-xl border-2 cursor-pointer transition-all font-bold text-sm ${formData.bankingExp===opt?'bg-slate-800 border-slate-800 text-white':'bg-white border-slate-200 text-slate-500 hover:border-slate-400'}`}>
                              <input type="radio" name="bankingExp" value={opt} checked={formData.bankingExp===opt} onChange={handleChange} className="hidden" />{opt}
                            </label>
                          ))}
                        </div>
                      </InputField>
                    </div>
                  </div>
                </div>
              </div>

              {/* Professional */}
              <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                <div className="px-4 py-3 border-b border-slate-100 bg-gradient-to-r from-blue-50 to-slate-50 flex items-center gap-2">
                  <span className="text-base">💼</span>
                  <span className="text-xs font-black text-blue-700 uppercase tracking-wider">Professional Details</span>
                </div>
                <div className="p-4 space-y-3">
                  <InputField label="Role">
                    <select name="role" value={formData.role} onChange={handleChange} className={inputCls}>
                      <option>Sales Executive</option><option>Back Office Exec</option><option>Telecaller</option><option>Floor Manager</option>
                    </select>
                  </InputField>
                  <InputField label="Work Experience">
                    <div className="flex gap-2 p-1 bg-white border border-slate-200 rounded-xl mb-2">
                      {['Fresher', 'Experienced'].map(type => (
                        <button type="button" key={type} onClick={() => setFormData(prev=>({...prev, expType: type}))} className={`flex-1 py-2 text-xs font-black rounded-lg transition-all ${formData.expType===type?'bg-slate-900 text-white shadow':'text-slate-500 hover:text-slate-800'}`}>{type}</button>
                      ))}
                    </div>
                  </InputField>

                  {formData.expType === 'Experienced' && (
                    <div className="bg-blue-50/50 border border-blue-100 rounded-xl p-4 space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Experience Duration — <span className="text-indigo-700 font-black">{expLabel}</span></label>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1">Years</label>
                            <select value={formData.yearsExpNum} onChange={e=>setFormData(prev=>({...prev,yearsExpNum:parseInt(e.target.value)||0}))} className={inputCls}>
                              {Array.from({length:31},(_,i)=><option key={i} value={i}>{i} yr{i!==1?'s':''}</option>)}
                            </select>
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1">Months</label>
                            <select value={formData.monthsExpNum} onChange={e=>setFormData(prev=>({...prev,monthsExpNum:parseInt(e.target.value)||0}))} className={inputCls}>
                              {Array.from({length:12},(_,i)=><option key={i} value={i}>{i} mo</option>)}
                            </select>
                          </div>
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">No. of Companies Worked</label>
                        <input type="number" min="1" value={formData.numCompanies} onChange={handleNumCompaniesChange} className={inputCls} placeholder="e.g. 2" />
                      </div>

                      {formData.companies.map((comp, idx) => (
                        <div key={idx} className="bg-white border border-slate-200 rounded-xl p-3 space-y-2">
                          <div className="text-xs font-black text-slate-500 uppercase tracking-wider">Company #{idx+1}</div>
                          <div className="grid grid-cols-3 gap-2">
                            <input value={comp.name||''} onChange={e=>handleCompanyChange(idx,'name',e.target.value)} placeholder="Company Name" className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-2 text-xs text-slate-900 outline-none focus:border-indigo-400 w-full"/>
                            <input value={comp.duration||''} onChange={e=>handleCompanyChange(idx,'duration',e.target.value)} placeholder="Duration" className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-2 text-xs text-slate-900 outline-none focus:border-indigo-400 w-full"/>
                            <input value={comp.salary||''} onChange={e=>handleCompanyChange(idx,'salary',e.target.value)} placeholder="Last CTC" className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-2 text-xs text-slate-900 outline-none focus:border-indigo-400 w-full"/>
                          </div>
                        </div>
                      ))}

                      {/* Documents */}
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Proof of Experience (Check all available)</label>
                        <div className="flex gap-4">
                          {[['salarySlip','💰 Salary Slip'],['bankStatement','🏦 Bank Statement'],['expLetter','📄 Exp. Letter']].map(([doc,label]) => (
                            <label key={doc} className={`flex items-center gap-2 px-3 py-2 rounded-xl border-2 cursor-pointer transition-all text-xs font-bold ${formData.documents[doc]?'bg-blue-600 border-blue-600 text-white':'bg-white border-slate-200 text-slate-600 hover:border-blue-300'}`}>
                              <input type="checkbox" checked={formData.documents[doc]} onChange={()=>handleDocChange(doc)} className="hidden" />
                              {label}
                            </label>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* Salary Info */}
              <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                <div className="px-4 py-3 border-b border-slate-100 bg-gradient-to-r from-emerald-50 to-slate-50 flex items-center gap-2">
                  <span className="text-base">💵</span>
                  <span className="text-xs font-black text-emerald-700 uppercase tracking-wider">Salary Information</span>
                </div>
                <div className="p-4 grid grid-cols-1 gap-3">
                  <InputField label="Last Salary (Monthly CTC)">
                    <div className="relative">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-bold">₹</span>
                      <input type="text" name="lastSalary" value={formData.lastSalary} onChange={e=>{const raw=e.target.value.replace(/,/g,'').replace(/[^\d]/g,''); if(raw===''){setFormData(p=>({...p,lastSalary:''}));return;} const n=parseInt(raw); setFormData(p=>({...p,lastSalary:n.toLocaleString('en-IN')}));}} className={inputCls + " pl-7"} placeholder="0" />
                    </div>
                  </InputField>
                  <InputField label="Salary Expectation (Monthly CTC)">
                    <div className="relative">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-bold">₹</span>
                      <input type="text" name="salaryExpectation" value={formData.salaryExpectation} onChange={e=>{const raw=e.target.value.replace(/,/g,'').replace(/[^\d]/g,''); if(raw===''){setFormData(p=>({...p,salaryExpectation:''}));return;} const n=parseInt(raw); setFormData(p=>({...p,salaryExpectation:n.toLocaleString('en-IN')}));}} className={inputCls + " pl-7"} placeholder="0" />
                    </div>
                  </InputField>
                  <InputField label="Final Offered Salary (HR fills after offer)">
                    <div className="relative">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-bold">₹</span>
                      <input type="text" name="finalOfferedSalary" value={formData.finalOfferedSalary} onChange={e=>{const raw=e.target.value.replace(/,/g,'').replace(/[^\d]/g,''); if(raw===''){setFormData(p=>({...p,finalOfferedSalary:''}));return;} const n=parseInt(raw); setFormData(p=>({...p,finalOfferedSalary:n.toLocaleString('en-IN')}));}} className={inputCls + " pl-7"} placeholder="0 (fill when offering)" />
                    </div>
                  </InputField>
                </div>
              </div>

            </form>
          )}
        </div>

        {!duplicateMatch && (
          <div className="p-4 border-t border-slate-200 bg-white">
            <button type="submit" form="create"
              disabled={formData.phone.length < 10 || !formData.interviewDate || !formData.name.trim()}
              className={`w-full py-3.5 rounded-2xl font-black text-sm transition-all shadow-lg flex items-center justify-center gap-2 ${(formData.phone.length>=10&&formData.interviewDate&&formData.name.trim())?'bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white shadow-indigo-600/25':'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
              Save Candidate Profile
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function SearchGuideModal({ candidates, onClose }) {
  const sampleRows = candidates.slice(0, 40).map((candidate) => ({
    phone: candidate.phone,
    name: candidate.name,
    stage: candidate.stage,
    owner: candidate.hr,
    behavior: candidate.stage === 'Interview' ? 'Existing lead check + cooldown/reassign flow' : `Visible under ${candidate.stage} section`
  }));

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
      <div className="bg-white border border-slate-200 rounded-xl w-full max-w-4xl shadow-2xl overflow-hidden">
        <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
          <div>
            <h2 className="text-lg font-bold text-slate-900">Search Test Data Guide</h2>
            <p className="text-xs text-slate-600 mt-1">In numbers ya names ko search box me daalo, result direct table me stage tag ke saath mil jayega.</p>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-slate-900 p-1"><X size={20} /></button>
        </div>

        <div className="p-5 max-h-[70vh] overflow-y-auto custom-scrollbar">
          <div className="rounded-lg border border-slate-200 overflow-hidden">
            <table className="w-full text-left text-sm">
              <thead className="bg-slate-100 text-slate-700 text-xs uppercase">
                <tr>
                  <th className="px-4 py-2">Phone</th>
                  <th className="px-4 py-2">Candidate</th>
                  <th className="px-4 py-2">Stage</th>
                  <th className="px-4 py-2">Owner</th>
                  <th className="px-4 py-2">Expected Result</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-200 bg-white">
                {sampleRows.map((row, index) => (
                  <tr key={`${row.phone}-${index}`} className="hover:bg-slate-50">
                    <td className="px-4 py-2 font-medium text-slate-900">{row.phone}</td>
                    <td className="px-4 py-2 text-slate-700">{row.name}</td>
                    <td className="px-4 py-2"><span className="px-2 py-0.5 rounded text-xs bg-blue-100 text-blue-700">{row.stage}</span></td>
                    <td className="px-4 py-2 text-slate-700">{row.owner}</td>
                    <td className="px-4 py-2 text-slate-600">{row.behavior}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// --- FORWARD WITH REMARK MODAL ---
function ForwardRemarkModal({ target, onClose, onConfirmForward, onConfirmJobOffer }) {
  const [remark, setRemark] = useState('');
  const stageLabels = { 'Round 2': 'Round 2', 'Job Offered': 'Job Offered', 'Training': 'Training', 'Hired': 'Hired' };
  const nextLabel = stageLabels[target.targetStage] || target.targetStage;
  const canJobOffer = target.currentStage === 'Interview';

  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] p-4">
      <div className="bg-white border border-slate-200 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
        <div className="p-5 border-b border-slate-100 bg-gradient-to-r from-blue-50 to-indigo-50 flex justify-between items-center">
          <div>
            <h2 className="text-base font-black text-slate-900 flex items-center gap-2">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#2563eb" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              Forward Candidate
            </h2>
            <p className="text-xs text-slate-500 mt-0.5">Moving to: <span className="font-bold text-blue-700">{nextLabel}</span></p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-800 p-1 rounded-lg hover:bg-white/80 transition-colors"><X size={18}/></button>
        </div>

        <div className="p-5">
          <label className="block text-sm font-bold text-slate-700 mb-2">
            Remark / Note <span className="text-red-500">*</span>
            <span className="text-slate-400 font-normal ml-1 text-xs">(mandatory — reason for forwarding)</span>
          </label>
          <textarea
            value={remark}
            onChange={e => setRemark(e.target.value)}
            placeholder="e.g. Candidate performed well in Round 1. Communication is strong. Forwarding to Round 2..."
            className="w-full h-28 bg-slate-50 border-2 border-slate-200 focus:border-blue-500 rounded-xl p-3 text-sm text-slate-900 outline-none resize-none transition-colors placeholder:text-slate-400"
          />
          <div className="flex justify-end mt-1 mb-4">
            <span className={`text-xs ${remark.trim().length < 10 ? 'text-red-400' : 'text-emerald-600'}`}>{remark.trim().length} chars {remark.trim().length < 10 ? '(min 10)' : '✓'}</span>
          </div>

          <div className="flex flex-col gap-2">
            <button
              disabled={remark.trim().length < 10}
              onClick={() => { onConfirmForward(target.candidateId, target.currentStage, remark.trim()); onClose(); }}
              className={`w-full py-3 rounded-xl text-sm font-black flex items-center justify-center gap-2 transition-all ${remark.trim().length >= 10 ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-md shadow-blue-600/25' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              Move to {nextLabel}
            </button>
            {canJobOffer && (
              <button
                disabled={remark.trim().length < 10}
                onClick={() => { onConfirmJobOffer(target.candidateId, target.currentStage, remark.trim()); onClose(); }}
                className={`w-full py-3 rounded-xl text-sm font-black flex items-center justify-center gap-2 transition-all ${remark.trim().length >= 10 ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-md shadow-emerald-600/25' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                Direct Job Offer (Skip Round 2)
              </button>
            )}
            <button onClick={onClose} className="w-full py-2.5 text-sm text-slate-500 hover:text-slate-800 font-medium transition-colors">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// --- SHARE FORM DEMO MODAL ---
function ShareFormDemoModal({ companySettings, onClose }) {
  const [copied, setCopied] = useState(false);
  const formLink = `${companySettings.interviewFormBaseUrl || 'https://yourcrm.app/interview-form'}?company=${encodeURIComponent(companySettings.companyName)}`;

  const handleCopy = () => {
    navigator.clipboard.writeText(formLink).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] p-4">
      <div className="bg-white border border-slate-200 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
        <div className="p-5 border-b border-slate-100 bg-gradient-to-r from-purple-50 to-pink-50 flex justify-between items-center">
          <div>
            <h2 className="text-base font-black text-slate-900 flex items-center gap-2">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#9333ea" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              Share Interview Form
            </h2>
            <p className="text-xs text-slate-500 mt-0.5">Candidates can self-fill this form</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-800 p-1 rounded-lg hover:bg-white/80 transition-colors"><X size={18}/></button>
        </div>

        <div className="p-5 overflow-y-auto custom-scrollbar flex-1">
          <div className="mb-5">
            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Shareable Form Link</label>
            <div className="flex gap-2">
              <div className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-700 font-mono break-all">{formLink}</div>
              <button onClick={handleCopy} className={`px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all whitespace-nowrap ${copied ? 'bg-emerald-100 text-emerald-700 border border-emerald-300' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}>
                {copied ? '✓ Copied!' : '📋 Copy'}
              </button>
            </div>
            <p className="text-xs text-slate-400 mt-2">Share this link via WhatsApp, email, or job portals. Candidate fills the form and it auto-populates in CRM.</p>
          </div>

          <div className="bg-gradient-to-b from-slate-50 to-white border border-slate-200 rounded-2xl overflow-hidden">
            <div className="bg-blue-700 px-5 py-3">
              <div className="text-white font-black text-sm">{companySettings.companyName}</div>
              <div className="text-blue-200 text-xs mt-0.5">Candidate Interview Registration Form</div>
            </div>
            <div className="p-4 space-y-3">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider">Preview — What Candidate Sees</div>
              <div className="grid grid-cols-2 gap-3">
                {['Full Name *', 'Mobile Number *', 'Alternate Mobile', 'Date of Birth', 'City', 'Highest Qualification'].map(field => (
                  <div key={field}>
                    <div className="text-xs text-slate-600 mb-1">{field}</div>
                    <div className="h-8 bg-white border border-slate-200 rounded-lg"></div>
                  </div>
                ))}
              </div>
              <div>
                <div className="text-xs text-slate-600 mb-1">Position Applying For</div>
                <div className="h-8 bg-white border border-slate-200 rounded-lg"></div>
              </div>
              <div>
                <div className="text-xs text-slate-600 mb-1">Work Experience</div>
                <div className="flex gap-2">
                  <div className="h-8 flex-1 bg-white border border-slate-200 rounded-lg"></div>
                  <div className="h-8 flex-1 bg-white border border-slate-200 rounded-lg"></div>
                </div>
              </div>
              <div>
                <div className="text-xs text-slate-600 mb-1">Upload Resume / CV</div>
                <div className="h-14 bg-white border-2 border-dashed border-slate-200 rounded-lg flex items-center justify-center text-xs text-slate-400">Click to upload PDF / JPG</div>
              </div>
              <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
                <div className="text-xs font-bold text-blue-800 mb-0.5">{companySettings.companyName} — Interview Details</div>
                <div className="text-xs text-blue-700">Office: {companySettings.officeAddress}</div>
                <div className="text-xs text-blue-700">Timing: {companySettings.officeTiming} | {companySettings.workingDays}</div>
                <div className="text-xs text-slate-500 mt-1">Contact: {companySettings.hrName} — {companySettings.hrMobile}</div>
              </div>
              <button className="w-full py-2.5 bg-blue-700 text-white rounded-xl text-sm font-bold opacity-80">Submit Application</button>
            </div>
          </div>
        </div>

        <div className="p-4 border-t border-slate-100 flex justify-end">
          <button onClick={onClose} className="px-5 py-2 text-sm text-slate-500 hover:text-slate-900 font-medium">Close</button>
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<HRManagerDashboard />);
  </script>
</body>
</html>
