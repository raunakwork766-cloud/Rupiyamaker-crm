      // lucide icon defs are arrays of [tagName, attrs] pairs
      const children = Array.isArray(iconDef) ? iconDef.map(([tag, attrs], i) =>
        React.createElement(tag, { key: i, ...attrs })
      ) : [];
      return React.createElement('svg', {
        xmlns: 'http://www.w3.org/2000/svg',
        width: size,
        height: size,
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: 'currentColor',
        strokeWidth: 2,
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        className
      }, ...children);

const parseFormattedDate = (str) => {
  if (!str) return null;
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parts = str.trim().split(' ');
  if (parts.length < 3) return null;
  return new Date(parseInt(parts[2]), months[parts[1]], parseInt(parts[0]));
};

// ─── DASHBOARD VIEW ─────────────────────────────────────────────────────────
function DashboardView({ candidates }) {
  const [dateFilter, setDateFilter] = useState('today');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo, setCustomTo] = useState('');

  const today = new Date();

  const getRange = () => {
    const now = new Date(today); now.setHours(0,0,0,0);
    if (dateFilter === 'today') return { start: now, end: now };
    if (dateFilter === 'week') {
      const start = new Date(now); start.setDate(now.getDate() - now.getDay());
      const end = new Date(start); end.setDate(start.getDate() + 6);
      return { start, end };
    }
    if (dateFilter === 'month') {
      const start = new Date(now.getFullYear(), now.getMonth(), 1);
      const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      return { start, end };
    }
    if (dateFilter === 'custom' && customFrom && customTo) {
      return { start: new Date(customFrom), end: new Date(customTo) };
    }
    return { start: now, end: now };
  };

  const inRange = (dateStr, range) => {
    const d = parseFormattedDate(dateStr);
    if (!d) return false;
    const s = new Date(range.start); s.setHours(0,0,0,0);
    const e = new Date(range.end); e.setHours(23,59,59,999);
    return d >= s && d <= e;
  };

  const range = getRange();
  const hrList = [...new Set(candidates.map(c => c.hr))].sort();

  const getMetrics = (hrName) => {
    const h = candidates.filter(c => c.hr === hrName);
    return {
      created: h.filter(c => inRange(c.createdDate, range)).length,
      conducted: h.filter(c => inRange(c.date, range)).length,
      round2: h.filter(c => c.stage === 'Round 2').length,
      jobOffered: h.filter(c => c.stage === 'Job Offered').length,
      training: h.filter(c => c.stage === 'Training').length,
      hired: h.filter(c => c.stage === 'Hired').length,
      rejected: h.filter(c => c.stage === 'Rejected').length,
      rescheduled: h.reduce((s, c) => s + (c.rescheduleCount || 0), 0),
      reassigned: h.filter(c => c.isReassigned).length,
      total: h.length
    };
  };

  const allMetrics = hrList.map(hr => ({ hr, ...getMetrics(hr) }));
  const T = (key) => allMetrics.reduce((s, m) => s + (m[key] || 0), 0);

  const MC = ({ v, cls }) => (
    <td className={`px-3 py-3.5 text-center text-sm font-bold ${v > 0 ? cls : 'text-slate-300'}`}>{v}</td>
  );

  const stageColors = {
    Interview: 'bg-blue-50 border-blue-200 text-blue-700',
    'Round 2': 'bg-indigo-50 border-indigo-200 text-indigo-700',
    'Job Offered': 'bg-orange-50 border-orange-200 text-orange-700',
    Training: 'bg-yellow-50 border-yellow-200 text-yellow-700',
    Hired: 'bg-emerald-50 border-emerald-200 text-emerald-700',
    Rejected: 'bg-red-50 border-red-200 text-red-700'
  };

  return (
    <div className="space-y-6">
      {/* Header */}
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h2 className="text-xl font-black text-slate-900 tracking-tight">HR Performance Dashboard</h2>
          <p className="text-sm text-slate-500 mt-0.5">Real-time hiring pipeline overview by recruiter</p>
        </div>
        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-2">
          <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-xl p-1 shadow-sm">
            {[['today', 'Today'], ['week', 'Week'], ['month', 'Month'], ['custom', 'Custom']].map(([val, label]) => (
              <button key={val} onClick={() => setDateFilter(val)}
                className={`px-3 py-1.5 text-xs rounded-lg font-bold transition-all ${dateFilter === val ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-800'}`}>
                {label}
              </button>
            ))}
          </div>
          {dateFilter === 'custom' && (
            <div className="flex items-center gap-2 bg-white border border-blue-200 rounded-xl px-3 py-1.5">
              <input type="date" value={customFrom} onChange={e => setCustomFrom(e.target.value)} className="text-xs border-0 outline-none text-slate-700 bg-transparent"/>
              <span className="text-slate-400 text-xs">→</span>
              <input type="date" value={customTo} onChange={e => setCustomTo(e.target.value)} className="text-xs border-0 outline-none text-slate-700 bg-transparent"/>
            </div>
          )}
        </div>
      </div>

      {/* KPI Cards */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
        {[
          { label: 'Total Pipeline', value: candidates.length, bg: 'from-blue-500 to-blue-700', icon: Users },
          { label: `Created (${dateFilter === 'today' ? 'Today' : dateFilter === 'week' ? 'Week' : 'Month'})`, value: T('created'), bg: 'from-indigo-500 to-indigo-700', icon: Plus },
          { label: 'Total Hired', value: T('hired'), bg: 'from-emerald-500 to-emerald-700', icon: CheckCircle },
          { label: 'Total Rejected', value: T('rejected'), bg: 'from-red-500 to-red-700', icon: XCircle }
        ].map(({ label, value, bg, icon: Icon }) => (
          <div key={label} className={`bg-gradient-to-br ${bg} rounded-xl p-5 text-white shadow-lg shadow-slate-900/10`}>
            <div className="flex items-center justify-between mb-3">
              <span className="text-xs font-semibold uppercase tracking-wider opacity-80">{label}</span>
              <Icon size={18} className="opacity-70" />
            </div>
            <div className="text-4xl font-black">{value}</div>
          </div>
        ))}
      </div>

      {/* Main Performance Table */}
      <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
        <div className="px-6 py-4 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white flex items-center gap-3">
          <BarChart3 size={20} className="text-blue-600" />
          <div>
            <h3 className="font-black text-slate-900">HR-wise Performance</h3>
            <p className="text-xs text-slate-500">Stage counts = current pipeline totals; Created & Conducted = date range filtered</p>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-left">
            <thead>
              <tr className="border-b-2 border-slate-200 bg-slate-50">
                <th className="px-5 py-3 text-xs font-black text-slate-700 uppercase tracking-wider sticky left-0 bg-slate-50 z-10">Recruiter</th>
                <th className="px-3 py-3 text-xs font-black text-blue-700 uppercase tracking-wider text-center whitespace-nowrap">📥 Created</th>
                <th className="px-3 py-3 text-xs font-black text-indigo-700 uppercase tracking-wider text-center whitespace-nowrap">🎯 Conducted</th>
                <th className="px-3 py-3 text-xs font-black text-purple-700 uppercase tracking-wider text-center">R2</th>
                <th className="px-3 py-3 text-xs font-black text-orange-700 uppercase tracking-wider text-center whitespace-nowrap">Job Offer</th>
                <th className="px-3 py-3 text-xs font-black text-yellow-700 uppercase tracking-wider text-center">Train</th>
                <th className="px-3 py-3 text-xs font-black text-emerald-700 uppercase tracking-wider text-center">✅ Hired</th>
                <th className="px-3 py-3 text-xs font-black text-red-700 uppercase tracking-wider text-center">❌ Rejected</th>
                <th className="px-3 py-3 text-xs font-black text-cyan-700 uppercase tracking-wider text-center">↩ Resched</th>
                <th className="px-3 py-3 text-xs font-black text-rose-700 uppercase tracking-wider text-center">🔄 Reassign</th>
                <th className="px-3 py-3 text-xs font-black text-slate-600 uppercase tracking-wider text-center">Total</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {allMetrics.map((m, i) => (
                <tr key={m.hr} className={`hover:bg-blue-50/30 transition-colors ${i % 2 === 0 ? 'bg-white' : 'bg-slate-50/40'}`}>
                  <td className="px-5 py-4 sticky left-0 bg-inherit z-10">
                    <div className="flex items-center gap-3">
                      <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 text-white flex items-center justify-center text-xs font-black shadow-md">
                        {m.hr.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
                      </div>
                      <div>
                        <div className="font-bold text-slate-900 text-sm">{m.hr}</div>
                        <div className="text-xs text-slate-500">{dummyHRs.find(h=>h.name===m.hr)?.address || 'HR Desk'}</div>
                      </div>
                    </div>
                  </td>
                  <MC v={m.created} cls="text-blue-700 bg-blue-50 rounded px-1" />
                  <MC v={m.conducted} cls="text-indigo-700" />
                  <MC v={m.round2} cls="text-purple-700" />
                  <MC v={m.jobOffered} cls="text-orange-700" />
                  <MC v={m.training} cls="text-yellow-700" />
                  <MC v={m.hired} cls="text-emerald-700 font-black" />
                  <MC v={m.rejected} cls="text-red-700" />
                  <MC v={m.rescheduled} cls="text-cyan-700" />
                  <MC v={m.reassigned} cls="text-rose-700" />
                  <td className="px-3 py-4 text-center text-sm font-black text-slate-800">{m.total}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr className="bg-slate-100 border-t-2 border-slate-300">
                <td className="px-5 py-3.5 text-xs font-black text-slate-800 uppercase tracking-wider">All HRs</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-blue-800">{T('created')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-indigo-800">{T('conducted')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-purple-800">{T('round2')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-orange-800">{T('jobOffered')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-yellow-800">{T('training')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-emerald-800">{T('hired')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-red-800">{T('rejected')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-cyan-800">{T('rescheduled')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-rose-800">{T('reassigned')}</td>
                <td className="px-3 py-3.5 text-center text-sm font-black text-slate-900">{candidates.length}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      {/* Pipeline Funnel */}
      <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
        <h3 className="font-black text-slate-900 mb-4 flex items-center gap-2">
          <TrendingUp size={18} className="text-blue-600" /> Current Pipeline Snapshot
        </h3>
        <div className="grid grid-cols-3 sm:grid-cols-6 gap-3">
          {[
            ['Interview', candidates.filter(c=>c.stage==='Interview').length, stageColors['Interview']],
            ['Round 2', candidates.filter(c=>c.stage==='Round 2').length, stageColors['Round 2']],
            ['Job Offered', candidates.filter(c=>c.stage==='Job Offered').length, stageColors['Job Offered']],
            ['Training', candidates.filter(c=>c.stage==='Training').length, stageColors['Training']],
            ['Hired', candidates.filter(c=>c.stage==='Hired').length, stageColors['Hired']],
            ['Rejected', candidates.filter(c=>c.stage==='Rejected').length, stageColors['Rejected']]
          ].map(([label, count, color]) => (
            <div key={label} className={`border rounded-xl p-4 text-center ${color}`}>
              <div className="text-3xl font-black">{count}</div>
              <div className="text-[11px] font-bold uppercase tracking-wider opacity-70 mt-1">{label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function HRManagerDashboard() {
  const [activeTab, setActiveTab] = useState('Interview');
  const [activeSubTab, setActiveSubTab] = useState('Today');
  const [candidates, setCandidates] = useState(initialCandidates);
  
  const [isDeclineModalOpen, setIsDeclineModalOpen] = useState(false);
  const [isRescheduleOpen, setIsRescheduleOpen] = useState(false);
  const [isCreateDrawerOpen, setIsCreateDrawerOpen] = useState(false);
  const [isSettingsOpen, setIsSettingsOpen] = useState(false);
  const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
  const [isRound1ModalOpen, setIsRound1ModalOpen] = useState(false);
  const [isDetailModalOpen, setIsDetailModalOpen] = useState(false);
  const [isNumberGuideOpen, setIsNumberGuideOpen] = useState(false);
  const [isForwardRemarkOpen, setIsForwardRemarkOpen] = useState(false);
  const [forwardTarget, setForwardTarget] = useState(null); // {candidateId, currentStage, targetStage}
  const [isShareFormOpen, setIsShareFormOpen] = useState(false);
  const [historyModalTab, setHistoryModalTab] = useState('full');
  
  const [cooldownDays, setCooldownDays] = useState(4);
  const [companySettings, setCompanySettings] = useState(defaultCompanySettings); 
  const [declineReasons, setDeclineReasons] = useState(defaultDeclineReasons);
  const [selectedCandidate, setSelectedCandidate] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [reasonFilter, setReasonFilter] = useState('All');
  const [auditSubTab, setAuditSubTab] = useState('Pending');

  const tabs = [
    { id: 'Dashboard', label: '⚡ Dashboard' },
    { id: 'Interview', label: 'Interview' },
    { id: 'Job Offered', label: 'Job Offered' },
    { id: 'Training', label: 'Training' },
    { id: 'Hired', label: 'Hired' },
    { id: 'Rejected', label: 'Rejected' },
    { id: 'Audit Logs', label: 'Audit Logs' }
  ];
  
  const getCount = (stage, subStage) => candidates.filter(c => c.stage === stage && (subStage ? c.subStage === subStage : true)).length;
  const normalizedSearch = searchQuery.trim().toLowerCase();
  const isGlobalSearch = normalizedSearch.length > 0;

  const subTabs = [
    { id: 'Today', label: 'Today Interview', count: getCount('Interview', 'Today') },
    { id: 'Upcoming', label: 'Upcoming Interview', count: getCount('Interview', 'Upcoming') },
    { id: 'No-Show', label: 'No-Show', count: getCount('Interview', 'No-Show') },
    { id: 'Round 2', label: 'Round 2 Qualified', count: getCount('Round 2') }
  ];

  const filteredCandidates = candidates.filter(c => {
    const matchesSearch = !isGlobalSearch ||
      c.name.toLowerCase().includes(normalizedSearch) ||
      (c.phone && c.phone.includes(searchQuery.trim())) ||
      c.hr.toLowerCase().includes(normalizedSearch) ||
      (c.role || '').toLowerCase().includes(normalizedSearch);
    if (!matchesSearch) return false;

    if (isGlobalSearch) return true;

    if (activeTab === 'Rejected' && reasonFilter !== 'All' && c.subStage !== reasonFilter) return false;
    if (activeTab === 'Audit Logs') {
      if (c.isReassigned !== true) return false;
      return auditSubTab === 'Pending' ? !c.isAudited : !!c.isAudited;
    }
    if (activeTab === 'Interview') {
      if (activeSubTab === 'Round 2') return c.stage === 'Round 2';
      return c.stage === 'Interview' && c.subStage === activeSubTab;
    }
    return c.stage === activeTab;
  });

  const pushActivity = (candidate, action, details) => ([
    ...(candidate.activityHistory || []),
    {
      date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
      action,
      details
    }
  ]);

  const updateCandidate = (id, updates, activity = null) => {
    setCandidates(prev => prev.map(c => {
      if (c.id !== id) return c;
      const nextCandidate = { ...c, ...updates, lastUpdated: new Date().toISOString() };
      if (activity) {
        nextCandidate.activityHistory = pushActivity(c, activity.action, activity.details);
      }
      return nextCandidate;
    }));
  };

  const handleForwardAction = (candidateId, currentStage) => {
    let newStage = ''; 
    const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    let extraProps = {};

    if (currentStage === 'Interview') {
      newStage = 'Round 2'; 
      extraProps = { 
        round1Feedback: { hrName: 'Raunak Kumar', date: dateStr, notes: 'Cleared Round 1 successfully. Proceeding to final technical round.' } 
      };
    } 
    else if (currentStage === 'Round 2') newStage = 'Job Offered';
    else if (currentStage === 'Job Offered') newStage = 'Training'; 
    else if (currentStage === 'Training') newStage = 'Hired';

    updateCandidate(
      candidateId,
      { stage: newStage, date: dateStr, ...extraProps },
      { action: 'Stage Updated', details: `Moved to ${newStage}` }
    );
  };

  const handleForwardWithRemark = (candidateId, currentStage, remark) => {
    let newStage = '';
    const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    let extraProps = {};
    if (currentStage === 'Interview' || currentStage === 'Round 2') newStage = 'Round 2' === currentStage ? 'Job Offered' : 'Round 2';
    else if (currentStage === 'Job Offered') newStage = 'Training';
    else if (currentStage === 'Training') newStage = 'Hired';
    if (currentStage === 'Interview') extraProps = { round1Feedback: { hrName: 'Raunak Kumar', date: dateStr, notes: remark } };
    updateCandidate(candidateId, { stage: newStage, date: dateStr, ...extraProps }, { action: 'Stage Updated', details: `Moved to ${newStage} — Remark: ${remark}` });
    setIsForwardRemarkOpen(false); setForwardTarget(null);
  };

  const handleForwardToJobOffer = (candidateId, currentStage, remark) => {
    const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    updateCandidate(candidateId, { stage: 'Job Offered', date: dateStr }, { action: 'Stage Updated', details: `Directly offered job from ${currentStage} — Remark: ${remark}` });
    setIsForwardRemarkOpen(false); setForwardTarget(null);
  };

  const handleMarkNoShow = (candidate) => updateCandidate(
    candidate.id,
    { subStage: 'No-Show' },
    { action: 'No-Show', details: 'Candidate marked as no-show' }
  );

  const handleRescheduleSubmit = (candidateId, newDateStr, reason) => {
    const candidate = candidates.find(c => c.id === candidateId);
    const newRescheduleEntry = { date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }), from: candidate.date, to: newDateStr, reason };
    updateCandidate(candidateId, { 
      subStage: 'Upcoming', date: newDateStr, 
      rescheduleCount: (candidate.rescheduleCount || 0) + 1, rescheduleHistory: [...(candidate.rescheduleHistory || []), newRescheduleEntry]
    }, { action: 'Rescheduled', details: `${candidate.date} → ${newDateStr} (${reason})` });
    setIsRescheduleOpen(false);
  };

  const handleDeclineSubmit = (candidateId, reason, remarks) => {
    updateCandidate(
      candidateId,
      { stage: 'Rejected', subStage: reason, remarks: remarks },
      { action: 'Rejected', details: `${reason} - ${remarks}` }
    );
    setIsDeclineModalOpen(false);
  };

  const handleCreateInterview = (data) => {
    setCandidates([{ 
      id: Date.now(), ...data, stage: 'Interview', subStage: 'Upcoming', status: 'pending', 
      hr: 'Raunak Kumar', hrAddress: 'Lucknow Desk', lastUpdated: new Date().toISOString(), createdDate: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
      reassignCount: 0, reassignHistory: [], rescheduleCount: 0, rescheduleHistory: [],
      activityHistory: [{ date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }), action: 'Profile Created', details: 'Candidate profile added from create interview form' }]
    }, ...candidates]);
    setIsCreateDrawerOpen(false);
  };

  const handleReassign = (candidateId, reason, duplicateMatch) => {
    const newHistoryEntry = { date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }), fromHr: duplicateMatch.hr, toHr: 'Raunak Kumar', reason: reason };
    updateCandidate(candidateId, {
      hr: 'Raunak Kumar', hrAddress: 'Lucknow Desk', stage: 'Interview', subStage: 'Upcoming', isReassigned: true, isAudited: false,
      reassignCount: (duplicateMatch.reassignCount || 0) + 1, reassignHistory: [...(duplicateMatch.reassignHistory || []), newHistoryEntry]
    }, { action: 'Reassigned', details: `${duplicateMatch.hr} → Raunak Kumar (${reason})` });
    setIsCreateDrawerOpen(false);
  };

  const handleToggleAudit = (candidateId, currentState) => updateCandidate(
    candidateId,
    { isAudited: !currentState },
    { action: !currentState ? 'Audit Complete' : 'Audit Reopened', details: !currentState ? 'Marked as audited' : 'Audit mark removed' }
  );

  return (
    <div className="flex flex-col h-screen bg-slate-50 text-slate-700 font-sans overflow-hidden">
      
      {/* HEADER */}
      <header className="px-6 py-3 border-b border-slate-200 bg-white flex justify-between items-center z-10 shrink-0">
        <div className="flex items-center gap-4">
          <h1 className="text-xl font-bold text-slate-900 tracking-tight">Interview Panel</h1>
        </div>
        <div className="flex items-center gap-6">
          <div className="flex items-center gap-4">
             <Bell size={20} className="text-slate-500 hover:text-slate-800 cursor-pointer" />
             <div className="text-right hidden sm:block">
               <div className="text-sm font-bold text-slate-900 uppercase tracking-wider">Raunak Kumar</div>
               <div className="text-[10px] text-slate-500 uppercase tracking-widest">Managing Director</div>
             </div>
             <div className="w-10 h-10 rounded-lg bg-indigo-600 border-2 border-slate-700 flex items-center justify-center text-white font-bold">RK</div>
          </div>
        </div>
      </header>

      {/* ACTION BAR & FILTERS */}
      <div className="px-6 py-4 flex flex-col sm:flex-row justify-between gap-4 bg-slate-50">
        <div className="flex items-center gap-3">
           <div className="relative w-64">
             <Search size={16} className="absolute left-3 top-2.5 text-slate-500" />
             <input 
               type="text" placeholder="Search by name, mobile, owner, role..." 
               value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
               className="w-full pl-9 pr-4 py-2 bg-white border border-slate-300 rounded-md text-sm text-slate-900 focus:ring-1 focus:ring-blue-500 outline-none"
             />
           </div>
           {activeTab === 'Rejected' && (
             <select 
               value={reasonFilter} onChange={(e) => setReasonFilter(e.target.value)}
               className="px-4 py-2 bg-white border border-slate-300 rounded-md text-sm text-slate-900 outline-none focus:ring-1 focus:ring-blue-500"
             >
               <option value="All">All Rejection Reasons</option>
               {declineReasons.map(r => <option key={r} value={r}>{r}</option>)}
             </select>
           )}
        </div>
        <div className="flex gap-2 flex-wrap">
          <button onClick={() => setIsNumberGuideOpen(true)} className="px-3 py-2 bg-white hover:bg-slate-100 border border-slate-300 text-slate-900 text-xs font-medium rounded-lg transition-colors flex items-center gap-1.5">
            <PhoneOff size={14} /> <span className="hidden sm:inline">Search Test Data</span>
          </button>
          <button onClick={() => setIsSettingsOpen(true)} className="px-3 py-2 bg-white hover:bg-slate-100 border border-slate-300 text-slate-900 text-xs font-medium rounded-lg transition-colors flex items-center gap-1.5">
            <Settings size={14} /> <span className="hidden sm:inline">Settings</span>
          </button>
          <button onClick={() => setIsCreateDrawerOpen(true)} className="px-3 py-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded-lg transition-colors flex items-center gap-1.5 shadow-lg shadow-blue-900/20">
            <Plus size={14} /> Create Interview
          </button>
        </div>
      </div>

      {/* MAIN CONTENT AREA */}
      <main className="flex-1 flex flex-col overflow-hidden bg-slate-50">
        <div className="flex-1 overflow-y-auto px-6 pb-8">
          <div className="max-w-[1600px] mx-auto">
            
            {/* TABS - horizontal scroll on mobile */}
            <div className="flex overflow-x-auto border-b border-slate-200 mb-6 tabs-scroll pb-0">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => { 
                    setActiveTab(tab.id); 
                    if(tab.id === 'Interview') setActiveSubTab('Today'); 
                    if(tab.id === 'Audit Logs') setAuditSubTab('Pending');
                    setReasonFilter('All'); 
                  }}
                  className={`pb-3 px-3 text-sm font-bold transition-all relative whitespace-nowrap shrink-0 ${activeTab === tab.id ? 'text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}
                >
                  {tab.id === 'Audit Logs' && <ShieldAlert size={14} className="inline mr-1" />}
                  {tab.label} {tab.id !== 'Interview' && tab.id !== 'Audit Logs' && `(${getCount(tab.id)})`}
                  {activeTab === tab.id && <span className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 rounded-t-md" />}
                </button>
              ))}
            </div>

            {/* SECONDARY TABS */}
            {activeTab === 'Interview' && (
              <div className="flex overflow-x-auto tabs-scroll space-x-2 mb-6 pb-1">
                {subTabs.map(subTab => (
                  <button
                    key={subTab.id}
                    onClick={() => setActiveSubTab(subTab.id)}
                    className={`px-4 py-2 text-sm font-medium rounded-md transition-colors flex items-center gap-2 ${activeSubTab === subTab.id ? 'bg-blue-50 text-blue-700 border border-blue-200' : 'bg-transparent text-slate-600 hover:text-slate-900'}`}
                  >
                    {subTab.label} <span className="bg-white border border-slate-300 px-2 py-0.5 rounded text-xs text-slate-700">{subTab.count}</span>
                  </button>
                ))}
              </div>
            )}

            {activeTab === 'Audit Logs' && !isGlobalSearch && (
              <div className="flex space-x-4 mb-6">
                {['Pending', 'Audited'].map(item => {
                  const count = candidates.filter(c => c.isReassigned && (item === 'Pending' ? !c.isAudited : !!c.isAudited)).length;
                  return (
                    <button
                      key={item}
                      onClick={() => setAuditSubTab(item)}
                      className={`px-4 py-2 text-sm font-medium rounded-md transition-colors flex items-center gap-2 ${auditSubTab === item ? 'bg-blue-50 text-blue-700 border border-blue-200' : 'bg-transparent text-slate-600 hover:text-slate-900'}`}
                    >
                      {item} <span className="bg-white border border-slate-300 px-2 py-0.5 rounded text-xs text-slate-700">{count}</span>
                    </button>
                  );
                })}
              </div>
            )}

            {isGlobalSearch && (
              <div className="mb-4 rounded-md border border-blue-200 bg-blue-50 px-4 py-2 text-sm text-blue-800">
                Showing {filteredCandidates.length} result(s) across all sections for "{searchQuery.trim()}".
              </div>
            )}

            {activeTab === 'Dashboard' && <DashboardView candidates={candidates} />}

            {/* DATA TABLE */}
            {activeTab !== 'Dashboard' && <div className="rounded-lg overflow-hidden border border-slate-200 shadow-sm bg-white">
              {filteredCandidates.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-24 text-slate-500 bg-white">
                  <Database size={48} className="mb-4 opacity-20" />
                  <p className="text-lg font-medium text-slate-600">No Data Available</p>
                </div>
              ) : (
                <div className="overflow-x-auto min-h-[400px]">
                  <table className="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                      <tr className="bg-gradient-to-r from-slate-100 to-slate-50 text-slate-600 text-[11px] font-black uppercase tracking-widest border-b-2 border-slate-200">
                        <th className="px-4 py-3.5 text-center w-10">#</th>
                        <th className="px-4 py-3.5">Created</th>
                        <th className="px-4 py-3.5">Owner</th>
                        <th className="px-4 py-3.5">Candidate</th>
                        <th className="px-4 py-3.5">Exp & Gender</th>
                        <th className="px-4 py-3.5">Role & Source</th>
                        <th className="px-5 py-3.5">{activeTab === 'Interview' ? 'Interview Date & Alerts' : 'Timeline & Alerts'}</th>
                        <th className="px-4 py-3.5 text-right">Action</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200 bg-white">
                      {filteredCandidates.map((candidate, index) => (
                        <CandidateTableRow 
                          key={candidate.id} 
                          index={index + 1}
                          candidate={candidate} 
                          activeTab={activeTab}
                          activeSubTab={activeSubTab}
                          isGlobalSearch={isGlobalSearch}
                          onForward={(targetStage) => { setForwardTarget({candidateId: candidate.id, currentStage: candidate.stage, targetStage}); setIsForwardRemarkOpen(true); }}
                          onDecline={() => { setSelectedCandidate(candidate); setIsDeclineModalOpen(true); }}
                          onReschedule={() => { setSelectedCandidate(candidate); setIsRescheduleOpen(true); }}
                          onMarkNoShow={() => handleMarkNoShow(candidate)}
                          onViewHistory={() => { setSelectedCandidate(candidate); setHistoryModalTab('full'); setIsHistoryModalOpen(true); }}
                          onViewReassignHistory={() => { setSelectedCandidate(candidate); setHistoryModalTab('reassign'); setIsHistoryModalOpen(true); }}
                          onViewRescheduleHistory={() => { setSelectedCandidate(candidate); setHistoryModalTab('reschedule'); setIsHistoryModalOpen(true); }}
                          onViewDetails={() => { setSelectedCandidate(candidate); setIsDetailModalOpen(true); }}
                          onWhatsApp={(c) => {
                          const msg = encodeURIComponent(`*INTERVIEW INVITATION*\n\nHi *${c.name}*,\n\nYour interview has been scheduled with our company.\n\n*Company Name:* ${companySettings.companyName}\n*Position:* ${c.role}\n\n*Job Description:*\n${companySettings.jobDescription}\n\n*Office Timing:* ${companySettings.officeTiming}\n*Working Days:* ${companySettings.workingDays}\n\n*INTERVIEW DETAILS*\n\n*Interview Date:* ${c.date}\n*Interview Timing:* ${companySettings.interviewTiming}\n*Please do not be late. Be on time.*\n\n*Office Address:*\n${companySettings.officeAddress}\nNearby: ${companySettings.officeNearby}\n\nFor any query:\n*${companySettings.hrName}*\nMobile: ${companySettings.hrMobile}\n${companySettings.hrDesignation}`);
                          const url = `https://wa.me/91${c.phone}?text=${msg}`;
                          window.open(url, '_blank');
                          updateCandidate(c.id, { waSent: true }, null);
                        }}
                          onToggleAudit={() => handleToggleAudit(candidate.id, candidate.isAudited)}
                        />
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>}

          </div>
        </div>
      </main>

      {/* MODALS */}
      <CreateInterviewDrawer 
        isOpen={isCreateDrawerOpen} onClose={() => setIsCreateDrawerOpen(false)} 
        onSave={handleCreateInterview} onReassign={handleReassign}
        allCandidates={candidates} cooldownDays={cooldownDays}
        companySettings={companySettings}
        onOpenShareForm={() => setIsShareFormOpen(true)}
      />
      {isSettingsOpen && <SettingsModal currentCooldown={cooldownDays} currentReasons={declineReasons} companySettings={companySettings} onClose={() => setIsSettingsOpen(false)} onSave={(days, reasons, cs) => { setCooldownDays(days); setDeclineReasons(reasons); setCompanySettings(cs); setIsSettingsOpen(false); }} />}
      {isRescheduleOpen && <RescheduleModal candidate={selectedCandidate} onClose={() => setIsRescheduleOpen(false)} onSubmit={handleRescheduleSubmit} />}
      {isDeclineModalOpen && <DeclineModal candidate={selectedCandidate} options={declineReasons} onClose={() => setIsDeclineModalOpen(false)} onSubmit={handleDeclineSubmit} />}
      {isHistoryModalOpen && <AuditHistoryModal candidate={selectedCandidate} initialTab={historyModalTab} onClose={() => setIsHistoryModalOpen(false)} />}
      {isRound1ModalOpen && <Round1InfoModal candidate={selectedCandidate} onClose={() => setIsRound1ModalOpen(false)} />}
      {isDetailModalOpen && <CandidateDetailModal candidate={selectedCandidate} onClose={() => setIsDetailModalOpen(false)} />}
      {isForwardRemarkOpen && forwardTarget && <ForwardRemarkModal target={forwardTarget} onClose={() => { setIsForwardRemarkOpen(false); setForwardTarget(null); }} onConfirmForward={handleForwardWithRemark} onConfirmJobOffer={handleForwardToJobOffer} />}
      {isShareFormOpen && <ShareFormDemoModal companySettings={companySettings} onClose={() => setIsShareFormOpen(false)} />}
    </div>
  );
}

// --- TABLE ROW COMPONENT ---
function CandidateTableRow({ candidate, index, activeTab, activeSubTab, isGlobalSearch, onForward, onDecline, onReschedule, onMarkNoShow, onViewHistory, onViewReassignHistory, onViewRescheduleHistory, onViewDetails, onToggleAudit, onViewRound1, onWhatsApp }) {
  const [isDropdownOpen, setIsDropdownOpen] = useState(false);
  const dropdownRef = useRef(null);

  useEffect(() => {
    function handleClickOutside(event) { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsDropdownOpen(false); }
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [dropdownRef]);

  const isInterviewNoShow = candidate.stage === 'Interview' && candidate.subStage === 'No-Show';
  const isRound2Candidate = candidate.stage === 'Round 2';

  // Audit Log Dedicated View

      <tr className="hover:bg-slate-50/80 transition-colors group">

            <div>
              <div className="font-bold text-slate-900 text-sm">{candidate.name}</div>
              <div className="text-xs text-slate-500 mt-0.5">{candidate.phone}</div>
            </div>
          </div>
        </td>
        <td className="px-4 py-3 border-r border-slate-100">
          <div className="text-sm font-medium text-slate-700">{candidate.role}</div>

  const primaryBtn = getPrimaryButtonText(candidate.stage);

  return (
    <tr className={`hover:bg-slate-50/70 transition-colors group ${isInterviewNoShow ? 'bg-amber-50/60' : ''}`}>
      <td className="px-4 py-3 text-center font-bold text-slate-400 text-xs border-r border-slate-100">{index}</td>

      <td className="px-4 py-3 border-r border-slate-100">
        <div className="text-xs font-semibold text-slate-700">{candidate.createdDate || 'N/A'}</div>
        <div className="text-[10px] text-slate-400 mt-0.5">Added</div>
      </td>

      <td className="px-4 py-3 border-r border-slate-100">
        <div className="text-xs font-bold text-slate-900">{candidate.hr}</div>
        <div className="text-[10px] text-slate-500 mt-0.5">{candidate.hrAddress || 'Desk N/A'}</div>
      </td>

      <td className="px-4 py-3 border-r border-slate-100">

          <div className="w-7 h-7 rounded-full bg-gradient-to-br from-purple-100 to-indigo-100 text-indigo-700 flex items-center justify-center font-black text-xs shrink-0">{candidate.name.charAt(0)}</div>
          <div>
            <button onClick={onViewDetails} className="font-bold text-slate-900 text-xs hover:text-blue-700 transition-colors text-left leading-tight">{candidate.name}</button>
            <div className="text-[10px] text-slate-500 mt-0.5">{candidate.phone}</div>
          </div>
        </div>
        {(isGlobalSearch) && <Tag text={candidate.stage} color="orange" />}
      </td>

      <td className="px-4 py-3 border-r border-slate-100">
        <div className="flex flex-col gap-1">
          <Tag icon={<Briefcase size={9} />} text={candidate.exp} color={candidate.exp === 'Fresher' ? 'green' : 'purple'} />
          <Tag icon={<User size={9} />} text={candidate.gender} color={candidate.gender === 'Female' ? 'pink' : 'blue'} />
        </div>
      </td>

      <td className="px-4 py-3 border-r border-slate-100">
        <div className="text-xs font-semibold text-slate-800">{candidate.role}</div>
        <div className="text-[10px] text-slate-500 mt-0.5">{candidate.source}</div>
      </td>

      <td className="px-5 py-3 border-r border-slate-100">
        <div className="text-xs font-bold text-blue-700 mb-1.5">{candidate.date}</div>
        <div className="flex flex-col gap-1 items-start">
          {(isRound2Candidate && candidate.round1Feedback) && (
            <button onClick={onViewRound1} className="bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 px-2 py-1 rounded-md text-[11px] font-semibold flex items-center gap-1.5 transition-colors">
              <Info size={11}/> R1 Notes
            </button>
          )}
          {activeTab === 'Rejected' && <span className="text-[11px] font-bold text-red-700 bg-red-50 border border-red-200 px-2 py-0.5 rounded-md">{candidate.subStage}</span>}
          {candidate.reassignCount > 0 && (
            <button onClick={onViewReassignHistory} className="bg-orange-50 hover:bg-orange-100 border border-orange-200 rounded-md px-2 py-0.5 text-[11px] text-orange-600 font-semibold flex items-center gap-1 transition-colors">
              <RefreshCw size={9}/> Reassigned: {candidate.reassignCount}x
            </button>
          )}
          {candidate.rescheduleCount > 0 && (
            <button onClick={onViewRescheduleHistory} className="bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-md px-2 py-0.5 text-[11px] text-indigo-600 font-semibold flex items-center gap-1 transition-colors">
              <Calendar size={9}/> Rescheduled: {candidate.rescheduleCount}x

      <td className="px-4 py-3 text-right relative" ref={dropdownRef}>

          {isInterviewNoShow && (

                <MoreVertical size={15} />
              </button>
              {isDropdownOpen && (
                <div className="absolute right-0 top-10 w-52 bg-white border border-slate-200 rounded-xl shadow-xl z-50 py-1.5 overflow-hidden text-left animate-in fade-in zoom-in-95">
                  {(candidate.stage === 'Interview' || candidate.stage === 'Round 2') && (
                    <>
                      <button onClick={() => { onReschedule(); setIsDropdownOpen(false); }} className="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2"><Calendar size={14}/> Reschedule Date</button>
                      {!isInterviewNoShow && candidate.stage === 'Interview' && (
                        <button onClick={() => { onMarkNoShow(); setIsDropdownOpen(false); }} className="w-full text-left px-4 py-2.5 text-sm text-amber-600 hover:bg-amber-50 flex items-center gap-2"><PhoneOff size={14}/> Mark No-Show</button>
                      )}
                    </>
                  )}
                  <button onClick={() => { onViewDetails(); setIsDropdownOpen(false); }} className="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2"><FileText size={14}/> View Details</button>
                  <div className="my-1 border-t border-slate-100"/>
                  <button onClick={() => { onDecline(); setIsDropdownOpen(false); }} className="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2"><XCircle size={14}/> Decline / Reject</button>

          <button onClick={() => onWhatsApp && onWhatsApp(candidate)} title={candidate.waSent ? 'WhatsApp Invite Sent' : 'Send WhatsApp Invite'} className={`p-2 rounded-lg border transition-all flex-shrink-0 ${candidate.waSent ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-slate-200 hover:border-emerald-400 hover:bg-emerald-50'}`}>
              <svg viewBox="0 0 24 24" width="14" height="14" fill={candidate.waSent ? '#16a34a' : '#94a3b8'}><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.858L.057 23.47a.5.5 0 0 0 .609.61l5.701-1.493A11.954 11.954 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.869 0-3.628-.49-5.153-1.346l-.375-.213-3.834 1.004 1.022-3.74-.227-.381A9.956 9.956 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
            </button>

          {(activeTab === 'Hired' || activeTab === 'Rejected') && (
            <button onClick={onViewHistory} className="text-[11px] font-bold text-slate-700 bg-slate-100 border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-200 transition-colors flex items-center gap-1.5">
              <History size={12}/> Full Track
            </button>
          )}
          {activeTab === 'Hired' && <span className="text-[11px] font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-2.5 py-2 rounded-lg">✅ Hired</span>}
        </div>
      </td>
    </tr>
  );
}

function Tag({ icon, text, color }) {
  const colors = { blue: "bg-blue-100 text-blue-700", pink: "bg-pink-100 text-pink-700", purple: "bg-purple-100 text-purple-700", green: "bg-emerald-100 text-emerald-700", orange: "bg-orange-100 text-orange-700", red: "bg-red-100 text-red-700" };
  return <span className={`flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold ${colors[color] || "bg-slate-100 text-slate-700"}`}>{icon && icon}<span>{text}</span></span>;
}

// --- ROUND 1 CONTEXT MODAL ---
function Round1InfoModal({ candidate, onClose }) {
  if (!candidate || !candidate.round1Feedback) return null;
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
      <div className="bg-white border border-slate-200 rounded-xl w-full max-w-md shadow-2xl overflow-hidden">
        <div className="p-5 border-b border-slate-200 flex justify-between bg-slate-50">
          <div>
             <h2 className="text-lg font-bold text-indigo-700 flex items-center gap-2"><Info size={18}/> Round 1 Context</h2>
             <p className="text-xs text-slate-600 mt-1">Previous interview feedback for {candidate.name}</p>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-slate-900 p-1"><X size={20}/></button>
        </div>
        <div className="p-6">
           <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-4">
             <div className="text-xs text-slate-500 mb-1 uppercase tracking-wider font-bold">Interviewer</div>
             <div className="text-sm text-slate-900 font-medium flex items-center gap-2"><User size={14} className="text-indigo-600"/> {candidate.round1Feedback.hrName}</div>
           </div>
           <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-4">
             <div className="text-xs text-slate-500 mb-1 uppercase tracking-wider font-bold">Interview Date</div>
             <div className="text-sm text-slate-900 font-medium flex items-center gap-2"><Calendar size={14} className="text-indigo-600"/> {candidate.round1Feedback.date}</div>
           </div>
           <div className="bg-slate-50 border border-slate-200 rounded-lg p-4">
             <div className="text-xs text-slate-500 mb-2 uppercase tracking-wider font-bold">HR Feedback / Remarks</div>
             <div className="text-sm text-slate-700 italic leading-relaxed">"{candidate.round1Feedback.notes}"</div>
           </div>
        </div>
      </div>
    </div>
  );
}

// --- HISTORY TIMELINE MODAL (Tabbed) ---
function AuditHistoryModal({ candidate, initialTab = 'full', onClose }) {
  const [activeTab, setActiveTab] = useState(initialTab);
  if (!candidate) return null;

  const reassigns = candidate.reassignHistory || [];
  const reschedules = candidate.rescheduleHistory || [];
  const activities = candidate.activityHistory && candidate.activityHistory.length > 0
    ? candidate.activityHistory
    : [
        { date: candidate.createdDate || 'N/A', action: 'Profile Created', details: 'Candidate added to pipeline' },
        { date: candidate.date || 'N/A', action: 'Current Status', details: `${candidate.stage}${candidate.subStage ? ` – ${candidate.subStage}` : ''}` }
      ];

  const stageColorMap = { Interview:'bg-blue-600', 'Round 2':'bg-indigo-600', 'Job Offered':'bg-orange-500', Training:'bg-yellow-500', Hired:'bg-emerald-600', Rejected:'bg-red-600' };
  const stageBg = stageColorMap[candidate.stage] || 'bg-slate-600';

  const tabs = [
    { id: 'reassign', label: 'Reassignments', count: reassigns.length, color: 'orange' },
    { id: 'reschedule', label: 'Reschedules', count: reschedules.length, color: 'indigo' },
    { id: 'full', label: 'Full Track', count: activities.length + reassigns.length + reschedules.length, color: 'blue' }
  ];

  const tabColors = { orange: 'bg-orange-100 text-orange-700 border-orange-300', indigo: 'bg-indigo-100 text-indigo-700 border-indigo-300', blue: 'bg-blue-100 text-blue-700 border-blue-300' };

  // Build full chronological timeline
  const fullTimeline = [
    ...activities.map(a => ({ type: 'activity', ...a, sortDate: parseFormattedDate(a.date) || new Date(0) })),
    ...reassigns.map(r => ({ type: 'reassign', date: r.date, fromHr: r.fromHr, toHr: r.toHr, reason: r.reason, sortDate: parseFormattedDate(r.date) || new Date(0) })),
    ...reschedules.map(r => ({ type: 'reschedule', date: r.date, from: r.from, to: r.to, reason: r.reason, sortDate: parseFormattedDate(r.date) || new Date(0) }))
  ].sort((a, b) => a.sortDate - b.sortDate);

  const TimelineItem = ({ item }) => {
    if (item.type === 'activity') return (
      <div className="relative pl-7">
        <div className="absolute left-0 top-1.5 w-3.5 h-3.5 rounded-full border-2 border-white bg-blue-500 shadow-sm"></div>
        <div className="bg-blue-50 border border-blue-200 rounded-xl p-3.5">
          <div className="flex items-center justify-between mb-1">
            <span className="text-[11px] font-black text-blue-700 uppercase tracking-wider flex items-center gap-1"><History size={10}/>{item.action}</span>
            <span className="text-[11px] text-slate-500">{item.date}</span>
          </div>
          <p className="text-xs text-slate-700">{item.details}</p>
        </div>
      </div>
    );
    if (item.type === 'reassign') return (
      <div className="relative pl-7">
        <div className="absolute left-0 top-1.5 w-3.5 h-3.5 rounded-full border-2 border-white bg-orange-500 shadow-sm"></div>
        <div className="bg-orange-50 border border-orange-200 rounded-xl p-3.5">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[11px] font-black text-orange-700 uppercase tracking-wider flex items-center gap-1"><RefreshCw size={10}/> Reassigned</span>
            <span className="text-[11px] text-slate-500">{item.date}</span>
          </div>
          <div className="flex items-center gap-2 text-sm mb-2 bg-white rounded-lg p-2 border border-orange-200">
            <span className="text-slate-500 font-medium">{item.fromHr}</span>
            <ArrowRightLeft size={14} className="text-orange-400 shrink-0"/>
            <span className="text-emerald-700 font-bold">{item.toHr}</span>
          </div>
          <div className="text-xs text-slate-600 italic bg-white rounded-lg px-3 py-2 border border-orange-100">"{item.reason}"</div>
        </div>
      </div>
    );
    if (item.type === 'reschedule') return (
      <div className="relative pl-7">
        <div className="absolute left-0 top-1.5 w-3.5 h-3.5 rounded-full border-2 border-white bg-indigo-500 shadow-sm"></div>
        <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-3.5">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[11px] font-black text-indigo-700 uppercase tracking-wider flex items-center gap-1"><Calendar size={10}/> Rescheduled</span>
            <span className="text-[11px] text-slate-500">{item.date}</span>
          </div>
          <div className="flex items-center gap-2 text-xs mb-2">
            <span className="bg-white border border-indigo-200 px-2 py-1 rounded font-semibold text-slate-700">{item.from}</span>
            <span className="text-indigo-400">→</span>
            <span className="bg-indigo-600 text-white px-2 py-1 rounded font-bold">{item.to}</span>
          </div>
          <div className="text-xs text-slate-600 italic bg-white rounded-lg px-3 py-2 border border-indigo-100">"{item.reason}"</div>
        </div>
      </div>
    );
    return null;
  };

  return (
    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 flex flex-col max-h-[90vh]">

        {/* Header */}
        <div className="px-6 py-5 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white flex items-start justify-between">
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 text-white flex items-center justify-center text-lg font-black shadow-md">
              {candidate.name.charAt(0)}
            </div>
            <div>
              <h2 className="text-lg font-black text-slate-900">{candidate.name}</h2>
              <div className="flex items-center gap-2 mt-1">
                <span className={`text-[11px] font-bold text-white px-2 py-0.5 rounded-full ${stageBg}`}>{candidate.stage}</span>
                <span className="text-xs text-slate-500">#{candidate.phone}</span>
                <span className="text-xs text-slate-400">•</span>
                <span className="text-xs text-slate-600">{candidate.hr}</span>
              </div>
            </div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 hover:bg-slate-100 p-2 rounded-lg transition-colors"><X size={20}/></button>
        </div>

        {/* Summary Badges */}
        <div className="px-6 py-3 border-b border-slate-100 bg-slate-50 flex items-center gap-3">
          <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mr-1">Summary:</span>
          <span className="bg-orange-100 text-orange-700 border border-orange-200 text-xs font-bold px-2.5 py-1 rounded-full flex items-center gap-1"><RefreshCw size={10}/> {reassigns.length} Reassignment{reassigns.length !== 1 ? 's' : ''}</span>
          <span className="bg-indigo-100 text-indigo-700 border border-indigo-200 text-xs font-bold px-2.5 py-1 rounded-full flex items-center gap-1"><Calendar size={10}/> {reschedules.length} Reschedule{reschedules.length !== 1 ? 's' : ''}</span>
          <span className="bg-blue-100 text-blue-700 border border-blue-200 text-xs font-bold px-2.5 py-1 rounded-full flex items-center gap-1"><History size={10}/> {activities.length} Events</span>
        </div>

        {/* Tabs */}
        <div className="flex border-b border-slate-200 px-6 bg-white">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)}
              className={`py-3 px-1 mr-6 text-sm font-bold border-b-2 transition-all flex items-center gap-2 ${activeTab === t.id ? `border-${t.color}-500 text-${t.color}-700` : 'border-transparent text-slate-500 hover:text-slate-800'}`}
              style={activeTab === t.id ? {borderColor: t.color === 'orange' ? '#f97316' : t.color === 'indigo' ? '#6366f1' : '#3b82f6', color: t.color === 'orange' ? '#c2410c' : t.color === 'indigo' ? '#4338ca' : '#1d4ed8'} : {}}>
              {t.label}
              <span className={`text-[10px] font-black px-1.5 py-0.5 rounded-full border ${tabColors[t.color] || 'bg-slate-100 text-slate-600 border-slate-200'}`}>{t.count}</span>
            </button>
          ))}
        </div>

        {/* Tab Content */}
        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">

          {/* REASSIGN TAB */}
          {activeTab === 'reassign' && (
            <div className="space-y-4">
              {reassigns.length === 0 ? (
                <div className="text-center py-12 text-slate-400">
                  <RefreshCw size={36} className="mx-auto mb-3 opacity-30"/>
                  <p className="font-medium">No reassignments recorded</p>
                </div>
              ) : reassigns.map((log, i) => (
                <div key={i} className="bg-white border border-orange-200 rounded-xl overflow-hidden shadow-sm">
                  <div className="bg-orange-50 px-4 py-2.5 flex items-center justify-between border-b border-orange-100">
                    <div className="flex items-center gap-2">
                      <RefreshCw size={14} className="text-orange-600"/>
                      <span className="text-xs font-black text-orange-700 uppercase tracking-wider">Reassignment #{i+1}</span>
                    </div>
                    <span className="text-xs text-slate-500 font-medium">{log.date}</span>
                  </div>
                  <div className="p-4">
                    <div className="flex items-center gap-3 bg-slate-50 rounded-xl p-3 mb-3 border border-slate-200">
                      <div className="text-center flex-1">
                        <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Previous Owner</div>
                        <div className="text-sm font-bold text-slate-700">{log.fromHr}</div>
                      </div>
                      <div className="flex flex-col items-center gap-1 text-slate-400">
                        <ArrowRightLeft size={18} className="text-orange-500"/>
                        <span className="text-[10px] text-slate-400">Transferred</span>
                      </div>
                      <div className="text-center flex-1">
                        <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1">New Owner</div>
                        <div className="text-sm font-black text-emerald-700">{log.toHr}</div>
                      </div>
                    </div>
                    <div className="bg-orange-50 border border-orange-100 rounded-lg px-4 py-3">
                      <div className="text-[10px] text-orange-600 font-black uppercase tracking-wider mb-1">Reason for Transfer</div>
                      <p className="text-sm text-slate-700 italic">"{log.reason}"</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* RESCHEDULE TAB */}
          {activeTab === 'reschedule' && (
            <div className="space-y-4">
              {reschedules.length === 0 ? (
                <div className="text-center py-12 text-slate-400">
                  <Calendar size={36} className="mx-auto mb-3 opacity-30"/>
                  <p className="font-medium">No reschedules recorded</p>
                </div>
              ) : reschedules.map((log, i) => (
                <div key={i} className="bg-white border border-indigo-200 rounded-xl overflow-hidden shadow-sm">
                  <div className="bg-indigo-50 px-4 py-2.5 flex items-center justify-between border-b border-indigo-100">
                    <div className="flex items-center gap-2">
                      <Calendar size={14} className="text-indigo-600"/>
                      <span className="text-xs font-black text-indigo-700 uppercase tracking-wider">Reschedule #{i+1}</span>
                    </div>
                    <span className="text-xs text-slate-500 font-medium">Changed on: {log.date}</span>
                  </div>
                  <div className="p-4">
                    <div className="flex items-center justify-center gap-4 bg-slate-50 rounded-xl p-4 mb-3 border border-slate-200">
                      <div className="text-center">
                        <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1.5">Original Date</div>
                        <div className="bg-white border border-slate-300 px-4 py-2 rounded-lg text-sm font-bold text-slate-700">{log.from}</div>
                      </div>
                      <div className="text-indigo-400 text-xl">→</div>
                      <div className="text-center">
                        <div className="text-[10px] text-slate-500 uppercase tracking-wider mb-1.5">New Date</div>
                        <div className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">{log.to}</div>
                      </div>
                    </div>
                    <div className="bg-indigo-50 border border-indigo-100 rounded-lg px-4 py-3">
                      <div className="text-[10px] text-indigo-600 font-black uppercase tracking-wider mb-1">Reason for Reschedule</div>
                      <p className="text-sm text-slate-700 italic">"{log.reason}"</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* FULL TRACK TAB */}
          {activeTab === 'full' && (
            <div>
              {fullTimeline.length === 0 ? (
                <div className="text-center py-12 text-slate-400">
                  <History size={36} className="mx-auto mb-3 opacity-30"/>
                  <p className="font-medium">No history available</p>
                </div>
              ) : (
                <div className="relative border-l-2 border-slate-200 ml-2.5 space-y-4 py-1">
                  {fullTimeline.map((item, i) => <TimelineItem key={i} item={item}/>)}
                </div>
              )}
            </div>
          )}
        </div>

        <div className="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end">
          <button onClick={onClose} className="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white text-sm font-bold rounded-lg transition-colors">Close</button>
        </div>
      </div>
    </div>
  );
}

function CandidateDetailModal({ candidate, onClose }) {
  if (!candidate) return null;
  const profile = candidate.profile || {};
  const companies = profile.companies || [];
  const documents = profile.documents || {};

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white border border-slate-200 rounded-xl w-full max-w-4xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95">
        <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
          <div>
            <h2 className="text-lg font-bold text-slate-900">Candidate Profile Details</h2>
            <p className="text-xs text-slate-600 mt-1">Complete data for {candidate.name}</p>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-slate-900 p-1"><X size={20}/></button>
        </div>

        <div className="p-6 max-h-[70vh] overflow-y-auto custom-scrollbar space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Name</div><div className="text-sm font-semibold text-slate-900">{candidate.name || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Phone</div><div className="text-sm font-semibold text-slate-900">{candidate.phone || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Alt Phone</div><div className="text-sm font-semibold text-slate-900">{profile.altPhone || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Stage</div><div className="text-sm font-semibold text-slate-900">{candidate.stage || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Sub Stage</div><div className="text-sm font-semibold text-slate-900">{candidate.subStage || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">HR</div><div className="text-sm font-semibold text-slate-900">{candidate.hr || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Role</div><div className="text-sm font-semibold text-slate-900">{candidate.role || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Source</div><div className="text-sm font-semibold text-slate-900">{candidate.source || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-slate-50"><div className="text-xs text-slate-500">Experience</div><div className="text-sm font-semibold text-slate-900">{candidate.exp || '-'}</div></div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div className="p-3 rounded-lg border border-slate-200 bg-white"><div className="text-xs text-slate-500">Qualification</div><div className="text-sm text-slate-800">{profile.qualification || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-white"><div className="text-xs text-slate-500">Age</div><div className="text-sm text-slate-800">{profile.age || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-white"><div className="text-xs text-slate-500">City</div><div className="text-sm text-slate-800">{profile.city || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-white"><div className="text-xs text-slate-500">Marital Status</div><div className="text-sm text-slate-800">{profile.maritalStatus || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-white"><div className="text-xs text-slate-500">Living Arrangement</div><div className="text-sm text-slate-800">{profile.livingArrangement || '-'}</div></div>
            <div className="p-3 rounded-lg border border-slate-200 bg-white"><div className="text-xs text-slate-500">Banking Experience</div><div className="text-sm text-slate-800">{profile.bankingExp || '-'}</div></div>
          </div>

          {companies.length > 0 && (
            <div className="border border-slate-200 rounded-lg p-4">
              <h3 className="text-sm font-bold text-slate-900 mb-3">Company History</h3>
              <div className="space-y-2">
                {companies.map((company, index) => (
                  <div key={index} className="grid grid-cols-3 gap-2 text-sm bg-slate-50 border border-slate-200 rounded p-2">
                    <div><span className="text-slate-500">Name: </span><span className="text-slate-800">{company.name || '-'}</span></div>
                    <div><span className="text-slate-500">Duration: </span><span className="text-slate-800">{company.duration || '-'}</span></div>
                    <div><span className="text-slate-500">Salary: </span><span className="text-slate-800">{company.salary || '-'}</span></div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="border border-slate-200 rounded-lg p-4">
            <h3 className="text-sm font-bold text-slate-900 mb-3">Documents</h3>
            <div className="flex gap-3 flex-wrap text-sm">
              <span className={`px-2 py-1 rounded ${documents.salarySlip ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>Salary Slip: {documents.salarySlip ? 'Yes' : 'No'}</span>
              <span className={`px-2 py-1 rounded ${documents.bankStatement ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>Bank Statement: {documents.bankStatement ? 'Yes' : 'No'}</span>
              <span className={`px-2 py-1 rounded ${documents.expLetter ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>Experience Letter: {documents.expLetter ? 'Yes' : 'No'}</span>
            </div>
          </div>
        </div>

        <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end">
          <button onClick={onClose} className="px-4 py-2 rounded bg-slate-800 text-white text-sm">Close</button>
        </div>
      </div>
    </div>
  );
}

// --- SETTINGS MODAL ---
function SettingsModal({ currentCooldown, currentReasons, companySettings: initCS, onClose, onSave }) {
  const [days, setDays] = useState(currentCooldown);
  const [reasons, setReasons] = useState(currentReasons);
  const [newReason, setNewReason] = useState('');
  const [tab, setTab] = useState('company');
  const [cs, setCs] = useState(initCS || {
    companyName: '', jobDescription: '', officeTiming: '', workingDays: '',
    interviewTiming: '', officeAddress: '', officeNearby: '',
    hrName: '', hrMobile: '', hrDesignation: '', interviewFormBaseUrl: ''
  });

  const handleAddReason = () => {
    if(newReason.trim() && !reasons.includes(newReason)) {
      setReasons([...reasons, newReason.trim()]); setNewReason('');
    }
  };
  const handleRemoveReason = (r) => setReasons(reasons.filter(item => item !== r));

  const tabs = [
    { id: 'company', label: '🏢 Company' },
    { id: 'pipeline', label: '⚙️ Pipeline' },
    { id: 'reasons', label: '📋 Reasons' },
  ];

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
      <div className="bg-white border border-slate-200 rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[92vh]">
        <div className="p-5 border-b border-slate-200 flex justify-between bg-gradient-to-r from-slate-50 to-blue-50/50">
          <div>
            <h2 className="text-lg font-black text-slate-900 flex items-center gap-2"><Settings size={18} className="text-blue-600"/> Global CRM Settings</h2>
            <p className="text-xs text-slate-400 mt-0.5">Company profile, pipeline rules, and interview configuration</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-800 p-1.5 rounded-lg hover:bg-white transition-colors"><X size={20}/></button>
        </div>

        <div className="flex border-b border-slate-200 bg-slate-50 px-5">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`px-4 py-3 text-sm font-bold border-b-2 transition-colors ${tab === t.id ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}>{t.label}</button>
          ))}
        </div>

        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">

          {tab === 'company' && (
            <div className="space-y-5">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Company Name</label>
                  <input value={cs.companyName} onChange={e => setCs({...cs, companyName: e.target.value})} className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none transition-all" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Office Timing</label>
                  <input placeholder="e.g. 10:00 AM – 7:00 PM" value={cs.officeTiming} onChange={e => setCs({...cs, officeTiming: e.target.value})} className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none transition-all" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Working Days</label>
                  <input placeholder="e.g. Monday to Saturday" value={cs.workingDays} onChange={e => setCs({...cs, workingDays: e.target.value})} className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none transition-all" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Interview Timing</label>
                  <input placeholder="e.g. 10:00 AM to 6:00 PM" value={cs.interviewTiming} onChange={e => setCs({...cs, interviewTiming: e.target.value})} className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none transition-all" />
                </div>
              </div>

              <div>
                <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Job Description (JD) — shown in WhatsApp invite</label>
                <textarea value={cs.jobDescription} onChange={e => setCs({...cs, jobDescription: e.target.value})} rows={3} placeholder="Describe the job role, responsibilities, and requirements..." className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none resize-none transition-all" />
              </div>

              <div>
                <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Office Address</label>
                <input value={cs.officeAddress} onChange={e => setCs({...cs, officeAddress: e.target.value})} placeholder="Full office address" className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none transition-all" />
              </div>

              <div>
                <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Nearby Landmark</label>
                <input value={cs.officeNearby} onChange={e => setCs({...cs, officeNearby: e.target.value})} placeholder="e.g. Electronic City Metro Station" className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none transition-all" />
              </div>

              <div className="bg-gradient-to-r from-green-50 to-emerald-50 border border-emerald-200 rounded-2xl p-4">
                <div className="text-xs font-black text-emerald-700 uppercase tracking-wide mb-3">HR Point of Contact</div>
                <div className="grid grid-cols-3 gap-3">
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1">HR Name</label>
                    <input value={cs.hrName} onChange={e => setCs({...cs, hrName: e.target.value})} className="w-full border border-slate-200 bg-white focus:border-emerald-500 rounded-xl px-3 py-2 text-sm outline-none" />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1">Mobile</label>
                    <input value={cs.hrMobile} onChange={e => setCs({...cs, hrMobile: e.target.value})} className="w-full border border-slate-200 bg-white focus:border-emerald-500 rounded-xl px-3 py-2 text-sm outline-none" />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1">Designation</label>
                    <input value={cs.hrDesignation} onChange={e => setCs({...cs, hrDesignation: e.target.value})} className="w-full border border-slate-200 bg-white focus:border-emerald-500 rounded-xl px-3 py-2 text-sm outline-none" />
                  </div>
                </div>
              </div>

              <div>
                <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">Interview Form Base URL</label>
                <input value={cs.interviewFormBaseUrl} onChange={e => setCs({...cs, interviewFormBaseUrl: e.target.value})} placeholder="https://yourcrm.app/interview-form" className="w-full border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 rounded-xl px-3 py-2.5 text-sm text-slate-900 outline-none font-mono transition-all" />
                <p className="text-xs text-slate-400 mt-1">This link is inserted in WhatsApp messages and shared with candidates.</p>
              </div>
            </div>
          )}

          {tab === 'pipeline' && (
            <div>
              <h3 className="text-sm font-bold text-blue-500 uppercase tracking-wider mb-3">Lead Hoarding Protection</h3>
              <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                <label className="block text-sm font-medium text-slate-700 mb-1">Cooldown Period (Days)</label>
                <p className="text-xs text-slate-500 mb-3 leading-relaxed">
                  <strong className="text-slate-700">Lock-in period:</strong> If a lead is active and was updated within this many days, other HRs cannot steal or reassign it.
                </p>
                <input type="number" value={days} onChange={(e) => setDays(Number(e.target.value))} className="w-24 bg-white border border-slate-300 rounded-lg px-4 py-2 text-slate-900 font-bold outline-none focus:border-blue-500" />
              </div>
            </div>
          )}

          {tab === 'reasons' && (
            <div>
              <h3 className="text-sm font-bold text-blue-500 uppercase tracking-wider mb-3">Decline & Drop Reasons</h3>
              <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                <p className="text-xs text-slate-500 mb-4">Manage reasons HRs can select when declining a candidate.</p>
                <div className="flex gap-2 mb-4">
                  <input value={newReason} onChange={e=>setNewReason(e.target.value)} placeholder="Add new reason..." className="flex-1 bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 outline-none focus:border-blue-500"/>
                  <button onClick={handleAddReason} className="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded-lg text-sm font-bold">Add</button>
                </div>
                <div className="flex flex-wrap gap-2 max-h-48 overflow-y-auto custom-scrollbar p-1">
                  {reasons.map(r => (
                    <span key={r} className="bg-white border border-slate-300 text-slate-700 text-xs px-3 py-1.5 rounded-full flex items-center gap-2">
                      {r} <button onClick={()=>handleRemoveReason(r)} className="text-slate-400 hover:text-red-500 transition-colors"><X size={12}/></button>
                    </span>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        <div className="p-5 border-t border-slate-200 bg-slate-50/80 flex justify-end gap-3">
          <button onClick={onClose} className="px-5 py-2 text-sm text-slate-500 hover:text-slate-900 font-medium">Cancel</button>
          <button onClick={() => onSave(days, reasons, cs)} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-black rounded-xl shadow-md shadow-blue-600/25 flex items-center gap-2">
