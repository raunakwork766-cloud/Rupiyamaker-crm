<!DOCTYPE html>
                <html>
                <head>
                    <title>Roles & Permissions Report</title>
                    <meta charset="UTF-8">
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { 
                            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                            padding: 20px;
                            min-height: 100vh;
                        }
                        .container {
                            max-width: 100%;
                            background: #fff;
                            border-radius: 12px;
                            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                            overflow: hidden;
                        }
                        .header {
                            background: linear-gradient(135deg, #000 0%, #333 100%);
                            color: #fff;
                            padding: 30px;
                            text-align: center;
                        }
                        .header h1 {
                            font-size: 28px;
                            margin-bottom: 10px;
                        }
                        .header .timestamp {
                            font-size: 14px;
                            opacity: 0.8;
                        }
                        .table-wrapper {
                            overflow-x: auto;
                            overflow-y: visible;
                            margin: 20px;
                            scroll-behavior: smooth;
                            -webkit-overflow-scrolling: touch;
                        }
                        table {
                            width: max-content;
                            border-collapse: separate;
                            border-spacing: 0;
                            font-size: 13px;
                        }
                        thead {
                            position: sticky;
                            top: 0;
                            z-index: 20;
                        }
                        th {
                            position: sticky;
                            top: 0;
                            background: #000;
                            color: #fff;
                            padding: 12px 8px;
                            font-weight: bold;
                            text-align: center;
                            border: 1px solid #333;
                            white-space: nowrap;
                        }
                        .sticky-col {
                            position: sticky;
                            background: #fff;
                            z-index: 10;
                        }
                        th.sticky-col {
                            z-index: 25;
                            background: #000;
                        }
                        .role-col { left: 0; min-width: 250px; max-width: 250px; text-align: left !important; }
                        .perm-col { left: 250px; min-width: 100px; }
                        
                        td.sticky-col {
                            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
                        }
                        
                        .sort-btn, .filter-btn {
                            background: #ffd700;
                            color: #000;
                            border: none;
                            padding: 4px 8px;
                            border-radius: 4px;
                            cursor: pointer;
                            font-size: 14px;
                            font-weight: bold;
                            transition: all 0.2s;
                        }
                        .sort-btn:hover, .filter-btn:hover {
                            background: #ffed4e;
                            transform: scale(1.1);
                        }
                        .filter-modal {
                            display: none;
                            position: fixed;
                            z-index: 1000;
                            left: 0;
                            top: 0;
                            width: 100%;
                            height: 100%;
                            background: rgba(0,0,0,0.8);
                            align-items: center;
                            justify-content: center;
                        }
                        .filter-modal.active {
                            display: flex;
                        }
                        .filter-content {
                            background: #1a1a1a;
                            padding: 30px;
                            border-radius: 12px;
                            max-width: 500px;
                            max-height: 80vh;
                            overflow-y: auto;
                            box-shadow: 0 10px 40px rgba(255,215,0,0.3);
                        }
                        .filter-content h3 {
                            color: #ffd700;
                            margin-bottom: 20px;
                            font-size: 20px;
                        }
                        .filter-options {
                            display: flex;
                            flex-direction: column;
                            gap: 10px;
                            margin-bottom: 20px;
                        }
                        .filter-option {
                            display: flex;
                            align-items: center;
                            gap: 10px;
                            padding: 10px;
                            background: #2a2a2a;
                            border-radius: 6px;
                            cursor: pointer;
                            transition: all 0.2s;
                        }
                        .filter-option:hover {
                            background: #3a3a3a;
                        }
                        .filter-option input[type="checkbox"] {
                            width: 18px;
                            height: 18px;
                            cursor: pointer;
                            accent-color: #ffd700;
                        }
                        .filter-option label {
                            color: #fff;
                            cursor: pointer;
                            flex: 1;
                        }
                        .filter-buttons {
                            display: flex;
                            gap: 10px;
                            justify-content: flex-end;
                        }
                        .filter-buttons button {
                            padding: 10px 20px;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-weight: bold;
                            transition: all 0.2s;
                        }
                        .apply-filter {
                            background: #ffd700;
                            color: #000;
                        }
                        .apply-filter:hover {
                            background: #ffed4e;
                        }
                        .cancel-filter {
                            background: #555;
                            color: #fff;
                        }
                        .cancel-filter:hover {
                            background: #666;
                        }
                        .module-header {
                            background: #000 !important;
                            color: #ffd700 !important;
                            font-size: 13px;
                            text-transform: uppercase;
                            letter-spacing: 1px;
                            padding: 15px 8px !important;
                            font-weight: 700;
                        }
                        .module-partition {
                            border-left: 5px solid #ffd700 !important;
                        }
                        .action-header {
                            background: #333 !important;
                            color: #ffd700 !important;
                            font-size: 12px;
                            font-weight: 600;
                            text-transform: lowercase;
                        }
                        .action-partition {
                            border-left: 5px solid #ffd700 !important;
                        }
                        td {
                            padding: 12px 8px;
                            border: 1px solid #e0e0e0;
                            text-align: center;
                            white-space: nowrap;
                        }
                        
                        .role-name {
                            font-weight: 600;
                            color: #000;
                            text-align: left !important;
                            padding-left: 15px !important;
                            background: #f9f9f9;
                            left: 0;
                        }
                        .dept-cell {
                            font-size: 13px;
                            color: #000;
                            font-weight: 600;
                            background: #fafafa;
                        }
                        .reports-cell {
                            font-size: 13px;
                            color: #000;
                            font-weight: 600;
                            background: #fafafa;
                        }
                        .perm-cell {
                            font-weight: 700;
                            color: #000;
                            background: #fff9e6;
                            left: 250px;
                        }
                        .check-cell {
                            background: #fff;
                            min-width: 50px;
                        }
                        .cell-partition {
                            border-left: 5px solid #ffd700 !important;
                        }
                        .check-yes {
                            color: #00c851;
                            font-size: 20px;
                            font-weight: bold;
                        }
                        .check-no {
                            color: #ddd;
                            font-size: 16px;
                        }
                        tr:hover td:not(.sticky-col) {
                            background: #f0f7ff;
                        }
                        .data-row.hidden {
                            display: none;
                        }
                        @media print {
                            body { background: #fff; padding: 0; }
                            .container { box-shadow: none; }
                            @page { size: landscape; }
                        }
                    </style>
                    <script>
                        let sortAscending = true;
                        let sortPermAscending = true;
                        let sortDeptAscending = true;
                        let sortReportsAscending = true;
                        let selectedRoles = [];

                        function sortTable() {
                            const table = document.querySelector('tbody');
                            const rows = Array.from(table.querySelectorAll('.data-row'));
                            
                            rows.sort((a, b) => {
                                const aText = a.querySelector('.role-name').textContent.toLowerCase();
                                const bText = b.querySelector('.role-name').textContent.toLowerCase();
                                
                                if (sortAscending) {
                                    return aText.localeCompare(bText);
                                } else {
                                    return bText.localeCompare(aText);
                                }
                            });
                            
                            sortAscending = !sortAscending;
                            rows.forEach(row => table.appendChild(row));
                        }

                        function sortByPermissions() {
                            const table = document.querySelector('tbody');
                            const rows = Array.from(table.querySelectorAll('.data-row'));
                            
                            rows.sort((a, b) => {
                                const aCount = parseInt(a.querySelector('.perm-cell').textContent);
                                const bCount = parseInt(b.querySelector('.perm-cell').textContent);
                                
                                if (sortPermAscending) {
                                    return aCount - bCount; // Low to High
                                } else {
                                    return bCount - aCount; // High to Low
                                }
                            });
                            
                            sortPermAscending = !sortPermAscending;
                            rows.forEach(row => table.appendChild(row));
                        }

                        function sortByDepartment() {
                            const table = document.querySelector('tbody');
                            const rows = Array.from(table.querySelectorAll('.data-row'));
                            
                            rows.sort((a, b) => {
                                const aText = a.querySelector('.dept-cell').textContent.toLowerCase();
                                const bText = b.querySelector('.dept-cell').textContent.toLowerCase();
                                
                                if (sortDeptAscending) {
                                    return aText.localeCompare(bText);
                                } else {
                                    return bText.localeCompare(aText);
                                }
                            });
                            
                            sortDeptAscending = !sortDeptAscending;
                            rows.forEach(row => table.appendChild(row));
                        }

                        function sortByReportsTo() {
                            const table = document.querySelector('tbody');
                            const rows = Array.from(table.querySelectorAll('.data-row'));
                            
                            rows.sort((a, b) => {
                                const aText = a.querySelector('.reports-cell').textContent.toLowerCase();
                                const bText = b.querySelector('.reports-cell').textContent.toLowerCase();
                                
                                if (sortReportsAscending) {
                                    return aText.localeCompare(bText);
                                } else {
                                    return bText.localeCompare(aText);
                                }
                            });
                            
                            sortReportsAscending = !sortReportsAscending;
                            rows.forEach(row => table.appendChild(row));
                        }

                        function toggleFilter() {
                            const modal = document.getElementById('filterModal');
                            modal.classList.toggle('active');
                        }

                        function applyFilter() {
                            const checkboxes = document.querySelectorAll('.role-checkbox:checked');
                            selectedRoles = Array.from(checkboxes).map(cb => cb.value);
                            
                            const rows = document.querySelectorAll('.data-row');
                            if (selectedRoles.length === 0) {
                                rows.forEach(row => row.classList.remove('hidden'));
                            } else {
                                rows.forEach(row => {
                                    const roleName = row.querySelector('.role-name').getAttribute('data-role');
                                    if (selectedRoles.includes(roleName)) {
                                        row.classList.remove('hidden');
                                    } else {
                                        row.classList.add('hidden');
                                    }
                                });
                            }
                            
                            toggleFilter();
                        }

                        function clearFilter() {
                            const checkboxes = document.querySelectorAll('.role-checkbox');
                            checkboxes.forEach(cb => cb.checked = false);
                            selectedRoles = [];
                            
                            const rows = document.querySelectorAll('.data-row');
                            rows.forEach(row => row.classList.remove('hidden'));
                            
                            toggleFilter();
                        }
                    </script>
                </head>
                <body>
                    <div class="container">
                        <div class="header">
                            <h1>📊 ROLES & PERMISSIONS REPORT</h1>
                            <div class="timestamp">Generated: ${new Date().toLocaleDateString('en-US', { 
                                weekday: 'long',
                                year: 'numeric', 
                                month: 'long', 
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            })}</div>
                        </div>
                        
                        <!-- Filter Modal -->
                        <div id="filterModal" class="filter-modal">
                            <div class="filter-content">
                                <h3>� Filter Roles</h3>
                                <div class="filter-options">
                                    ${reportRoles.map(role => `
                                        <div class="filter-option">
                                            <input type="checkbox" class="role-checkbox" value="${role.name.toLowerCase()}" id="role-${role.name.replace(/\s+/g, '-').toLowerCase()}">
                                            <label for="role-${role.name.replace(/\s+/g, '-').toLowerCase()}">${role.name}</label>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="filter-buttons">
                                    <button class="cancel-filter" onclick="clearFilter()">Clear All</button>
                                    <button class="apply-filter" onclick="applyFilter()">Apply Filter</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    ${headerRow1}
                                    ${headerRow2}
                                </thead>
                                <tbody>
                                    ${dataRows}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </body>
                </html>
