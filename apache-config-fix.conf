<VirtualHost *:80>
    ServerAdmin admin@fixyourfinance
    DocumentRoot "/www/wwwroot/RupiyaMe/rupiyamaker-UI/crm/"
    ServerName crm.fixyourfinance.ai
    ErrorLog "/www/wwwlogs/crm-fixyourfinance-error_log"
    CustomLog "/www/wwwlogs/crm-fixyourfinance-access_log" combined
    #HTTP_TO_HTTPS_START
    <IfModule mod_rewrite.c>
        RewriteEngine on
        RewriteCond %{SERVER_PORT} !^443$
        RewriteRule (.*) https://%{SERVER_NAME}$1 [L,R=301]
    </IfModule>
    #HTTP_TO_HTTPS_END

    <Files ~ (\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env)$>
       Order allow,deny
       Deny from all
    </Files>

    ProxyPass /.well-known/ !

    <IfModule mod_proxy.c>
        ProxyRequests Off
        SSLProxyEngine on
        ProxyPass / http://127.0.0.1:4521/
        ProxyPassReverse / http://127.0.0.1:4521/
    </IfModule>
</VirtualHost>
<VirtualHost *:443>
    ServerAdmin admin@fixyourfinance
    DocumentRoot "/www/wwwroot/RupiyaMe/rupiyamaker-UI/crm/"
    ServerName crm.fixyourfinance.ai
    ErrorLog "/www/wwwlogs/crm-fixyourfinance-error_log"
    CustomLog "/www/wwwlogs/crm-fixyourfinance-access_log" combined

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/crm.fixyourfinance.ai/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/crm.fixyourfinance.ai/privkey.pem
    SSLCipherSuite EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5
    SSLProtocol All -SSLv2 -SSLv3 -TLSv1
    SSLHonorCipherOrder On

    <Files ~ (\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env)$>
       Order allow,deny
       Deny from all
    </Files>

    ProxyPass /.well-known/ !

    <IfModule mod_proxy.c>
        ProxyRequests Off
        SSLProxyEngine off

        ProxyPass /api/ http://127.0.0.1:8049/
        ProxyPassReverse /api/ http://127.0.0.1:8049/

        ProxyPass /api http://127.0.0.1:8049/
        ProxyPassReverse /api http://127.0.0.1:8049/

        ProxyPass / http://127.0.0.1:4521/
        ProxyPassReverse / http://127.0.0.1:4521/
    </IfModule>
</VirtualHost>
