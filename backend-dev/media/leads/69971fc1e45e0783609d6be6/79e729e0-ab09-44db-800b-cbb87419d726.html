<!DOCTYPE html>
<html lang="en">
<head>
<style>
    body { background: #f4f6f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; }
    .mobile-list { max-width: 600px; margin: 0 auto; }
    
    .mobile-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px; }
    .candidate-name { font-size: 18px; font-weight: bold; color: #1a1a1a; }
    .date-badge { background: #eef2ff; color: #4f46e5; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .info-item label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
    .info-item div { font-size: 14px; font-weight: 500; }
    
    .action-bar { display: flex; gap: 10px; border-top: 1px solid #f0f0f0; padding-top: 15px; }
    .btn-block { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-align: center; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-outline { background: transparent; border: 1px solid #ddd; color: #555; }
</style>
</head>
<body>
<div class="mobile-list">
    <h2 style="text-align:center; margin-bottom:20px;">Interview Panel</h2>
    
    <!-- Item 1 -->
    <div class="mobile-card">
        <div class="card-top">
            <div class="candidate-name">Ali Raza</div>
            <div class="date-badge">26 Feb</div>
        </div>
        
        <div class="info-grid">
            <div class="info-item">
                <label>Role</label>
                <div>Back Office Exec</div>
            </div>
            <div class="info-item">
                <label>Source</label>
                <div>LinkedIn</div>
            </div>
            <div class="info-item">
                <label>Details</label>
                <div>Male • 1-2 Years</div>
            </div>
            <div class="info-item">
                <label>Phone</label>
                <div>9999999999</div>
            </div>
        </div>
        
        <div class="action-bar">
            <button class="btn-block btn-primary">Offer Job</button>
            <button class="btn-block btn-outline">•••</button>
        </div>
    </div>

    <!-- Item 2 -->
    <div class="mobile-card">
        <div class="card-top">
            <div class="candidate-name">Sarah Khan</div>
            <div class="date-badge">26 Feb</div>
        </div>
        
        <div class="info-grid">
            <div class="info-item">
                <label>Role</label>
                <div>Sales Executive</div>
            </div>
            <div class="info-item">
                <label>Source</label>
                <div>Walk-in</div>
            </div>
            <div class="info-item">
                <label>Details</label>
                <div>Female • Fresher</div>
            </div>
            <div class="info-item">
                <label>Phone</label>
                <div>9876543211</div>
            </div>
        </div>
        
        <div class="action-bar">
            <button class="btn-block btn-primary">Offer Job</button>
            <button class="btn-block btn-outline">•••</button>
        </div>
    </div>
</div>
</body>
</html>
